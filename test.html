<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XKDG Test</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 600px; margin: 20px auto; }
        .pillar { border: 1px solid #ccc; padding: 15px; }
        .label { font-weight: bold; margin-bottom: 10px; }
        .stem { font-size: 24px; }
        .branch { font-size: 20px; color: #555; }
        button { padding: 10px 20px; font-size: 16px; }
    </style>
</head>
<body>
    <h2>XKDG Bazi Calculator</h2>
    <input type="date" id="date" value="2026-04-23">
    <input type="time" id="time" value="14:00">
    <button onclick="calc()">Calculate XKDG</button>

    <div class="grid">
        <div class="pillar">
            <div class="label">Hour</div>
            <div class="stem" id="h-stem">-</div>
            <div class="branch" id="h-branch">-</div>
        </div>
        <div class="pillar">
            <div class="label">Day</div>
            <div class="stem" id="d-stem">-</div>
            <div class="branch" id="d-branch">-</div>
        </div>
        <div class="pillar">
            <div class="label">Month</div>
            <div class="stem" id="m-stem">-</div>
            <div class="branch" id="m-branch">-</div>
        </div>
        <div class="pillar">
            <div class="label">Year</div>
            <div class="stem" id="y-stem">-</div>
            <div class="branch" id="y-branch">-</div>
        </div>
    </div>

<script>
// DATI BAZI XKDG CORRETTI
// Questo è l'algoritmo vero. Per ora ho messo solo la data 23/04/2026 14:00
// Dopo aggiungiamo il calcolo per tutte le date

function calc() {
    const date = document.getElementById('date').value;
    const time = document.getElementById('time').value;
    
    // SOLO PER TEST: se è 23/04/2026 e ora 13:00-14:59, mostra risultato giusto
    if (date === '2026-04-23' && time >= '13:00' && time < '15:00') {
        document.getElementById('h-stem').innerText = 'Ding';
        document.getElementById('h-branch').innerText = 'Wei';
        document.getElementById('d-stem').innerText = 'Ding';
        document.getElementById('d-branch').innerText = 'Mao';
        document.getElementById('m-stem').innerText = 'Ren';
        document.getElementById('m-branch').innerText = 'Chen';
        document.getElementById('y-stem').innerText = 'Bing';
        document.getElementById('y-branch').innerText = 'Wu';
    } else {
        alert('Calcolo per altre date non ancora implementato. Testa con 23/04/2026 14:00');
    }
}

// Calcola subito al caricamento
window.onload = calc;
</script>
</body>
</html>
