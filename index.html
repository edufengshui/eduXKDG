<body>

<h3 style="margin-top:30px;">XKDG Hexagrams</h3>
<div class="chart">
    <div class="pillar">
        <div class="label">Hour Hex</div>

  <!-- SCRIPT SEMPRE IN FONDO, DOPO L'HTML -->

  <script>
// XKDG Bazi - Local Solar Time + GPS Auto - EN Output


// 1. GPS - GET AUTOMATIC LONGITUDE
function getLocation() {
    if (navigator.geolocation) {
        document.getElementById('solar-time').innerText = 'Getting GPS location...';
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lon = position.coords.longitude.toFixed(2);
                document.getElementById('longitude').value = lon;
                document.getElementById('solar-time').innerText = `GPS: Lon ${lon}° detected`;
                calc(); // recalc immediately with correct longitude
            },
            (error) => {
                document.getElementById('solar-time').innerText = 'GPS denied. Enter longitude manually';
            }
        );
    } else {
        alert('Geolocation not supported by browser');
    }
}

// 2. LOCAL SOLAR TIME CALCULATION
function getSolarTime(hour, minute, longitude, timezoneOffset) {
    const standardMeridian = timezoneOffset * 15;
    const longitudeDiff = longitude - standardMeridian;
    const timeDiffMinutes = longitudeDiff * 4;

    let totalMinutes = hour * 60 + minute + timeDiffMinutes;
    let dayOffset = 0;

    if (totalMinutes < 0) {
        totalMinutes += 1440;
        dayOffset = -1;
    } else if (totalMinutes >= 1440) {
        totalMinutes -= 1440;
        dayOffset = 1;
    }

    const solarHour = Math.floor(totalMinutes / 60);
    const solarMinute = Math.floor(totalMinutes % 60);
    return { hour: solarHour, minute: solarMinute, dayOffset: dayOffset };
}

function getDayGanzhi(date) {
    const refDate = new Date(2026, 3, 23);
    const refIndex = 3;
    const diffDays = Math.round((date - refDate) / 86400000);
    const stemIndex = (refIndex + diffDays) % 10;
    const branchIndex = (refIndex + diffDays) % 12;
    return {
        stem: STEMS[stemIndex < 0? stemIndex + 10 : stemIndex],
        branch: BRANCHES[branchIndex < 0? branchIndex + 12 : branchIndex]
    };
}


function getHourGanzhi(hour, dayStem) {
    const branchIndex = Math.floor((hour + 1) / 2) % 12;
    const dayStemIndex = STEMS.indexOf(dayStem);
    const stemStart = [0, 2, 4, 6, 8][dayStemIndex % 5];
    const stemIndex = (stemStart + branchIndex) % 10;
    return { stem: STEMS[stemIndex], branch: BRANCHES[branchIndex] };
}

function calc() {
    const dateInput = document.getElementById('date').value;
    const timeInput = document.getElementById('time').value;
    const longitude = parseFloat(document.getElementById('longitude').value);

    if (!dateInput ||!timeInput || isNaN(longitude)) {
        alert('Please enter date, time and longitude');
        return;
    }

    const [year, month, day] = dateInput.split('-').map(Number);
    const [hour, minute] = timeInput.split(':').map(Number);
    const timezoneOffset = -new Date(year, month - 1, day).getTimezoneOffset() / 60;

    const solar = getSolarTime(hour, minute, longitude, timezoneOffset);
    const baziDate = new Date(year, month - 1, day + solar.dayOffset);

    const yearGZ = getYearGanzhi(baziDate);
    const monthGZ = getMonthGanzhi(baziDate, yearGZ.stem);
    const dayGZ = getDayGanzhi(baziDate);
    const hourGZ = getHourGanzhi(solar.hour, dayGZ.stem);

        // Mapping caratteri cinesi + elementi + animali
    const STEM_CN = {Jia:'甲', Yi:'乙', Bing:'丙', Ding:'丁', Wu:'戊', Ji:'己', Geng:'庚', Xin:'辛', Ren:'壬', Gui:'癸'};
    const BRANCH_CN = {Zi:'子', Chou:'丑', Yin:'寅', Mao:'卯', Chen:'辰', Si:'巳', Wu:'午', Wei:'未', Shen:'申', You:'酉', Xu:'戌', Hai:'亥'};
    const STEM_EL = {Jia:'+ Wood', Yi:'- Wood', Bing:'+ Fire', Ding:'- Fire', Wu:'+ Earth', Ji:'- Earth', Geng:'+ Metal', Xin:'- Metal', Ren:'+ Water', Gui:'- Water'};
    const BRANCH_EL = {Zi:'+ Water', Chou:'- Earth', Yin:'+ Wood', Mao:'- Wood', Chen:'+ Earth', Si:'- Fire', Wu:'+ Fire', Wei:'- Earth', Shen:'+ Metal', You:'- Metal', Xu:'+ Earth', Hai:'- Water'};
    const BRANCH_AN = {Zi:'Rat', Chou:'Ox', Yin:'Tiger', Mao:'Rabbit', Chen:'Dragon', Si:'Snake', Wu:'Horse', Wei:'Goat', Shen:'Monkey', You:'Rooster', Xu:'Dog', Hai:'Pig'};
    const EL_COLOR = {Jia:'wood', Yi:'wood', Bing:'fire', Ding:'fire', Wu:'earth', Ji:'earth', Geng:'metal', Xin:'metal', Ren:'water', Gui:'water'};
    const BR_COLOR = {Zi:'water', Chou:'earth', Yin:'wood', Mao:'wood', Chen:'earth', Si:'fire', Wu:'fire', Wei:'earth', Shen:'metal', You:'metal', Xu:'earth', Hai:'water'};

    // Riempi Stem
    ['h','d','m','y'].forEach((p,i) => {
        const gz = [hourGZ, dayGZ, monthGZ, yearGZ][i];
        document.getElementById(`${p}-stem-cn`).innerText = STEM_CN[gz.stem];
        document.getElementById(`${p}-stem-cn`).className = `stem-cn ${EL_COLOR[gz.stem]}`;
        document.getElementById(`${p}-stem-py`).innerText = gz.stem;
        document.getElementById(`${p}-stem-el`).innerText = STEM_EL[gz.stem];
    });

    // Riempi Branch
    ['h','d','m','y'].forEach((p,i) => {
        const gz = [hourGZ, dayGZ, monthGZ, yearGZ][i];
        document.getElementById(`${p}-branch-cn`).innerText = BRANCH_CN[gz.branch];
        document.getElementById(`${p}-branch-cn`).className = `branch-cn ${BR_COLOR[gz.branch]}`;
        document.getElementById(`${p}-branch-py`).innerText = gz.branch;
        document.getElementById(`${p}-branch-an`).innerText = BRANCH_AN[gz.branch];
        document.getElementById(`${p}-branch-el`).innerText = BRANCH_EL[gz.branch];
    });

    // Riga rosa: solo data/ora
    document.getElementById('h-time').innerText = `${String(solar.hour).padStart(2,'0')}:${String(solar.minute).padStart(2,'0')}`;
    document.getElementById('d-date').innerText = `${String(solar.day).padStart(2,'0')} | ${dayGZ.branch}`;
    document.getElementById('m-date').innerText = `${String(solar.month).padStart(2,'0')} | ${monthGZ.branch}`;
    document.getElementById('y-year').innerText = solar.year;

    // Esagrammi XKDG con linee soggetto/oggetto
    const hourHex = getXKDGHexagram(hourGZ.stem, hourGZ.branch);
    const dayHex = getXKDGHexagram(dayGZ.stem, dayGZ.branch);
    const monthHex = getXKDGHexagram(monthGZ.stem, monthGZ.branch);
    const yearHex = getXKDGHexagram(yearGZ.stem, yearGZ.branch);

    document.getElementById('h-hex-cell').innerHTML = renderHexagram(hourHex);
    document.getElementById('d-hex-cell').innerHTML = renderHexagram(dayHex);
    document.getElementById('m-hex-cell').innerHTML = renderHexagram(monthHex);
    document.getElementById('y-hex-cell').innerHTML = renderHexagram(yearHex);
    document.getElementById('h-hex-num').innerText = hourHex.num;
    document.getElementById('h-hex-name').innerText = hourHex.name;
    document.getElementById('d-hex-num').innerText = dayHex.num;
    document.getElementById('d-hex-name').innerText = dayHex.name;
    document.getElementById('m-hex-num').innerText = monthHex.num;
    document.getElementById('m-hex-name').innerText = monthHex.name;
    document.getElementById('y-hex-num').innerText = yearHex.num;
    document.getElementById('y-hex-name').innerText = yearHex.name;
    document.getElementById('solar-time').innerText =
        `Solar Time: ${String(solar.hour).padStart(2,'0')}:${String(solar.minute).padStart(2,'0')}
         | Lon: ${longitude}° | Correction: ${((longitude - timezoneOffset*15)*4).toFixed(1)} min`;
}

function setNow() {
    const now = new Date();
    document.getElementById('date').value = now.toISOString().split('T')[0];
    document.getElementById('time').value = now.toTimeString().slice(0,5);
}

function calculate() {
    calc();
}

window.onload = function() {
    setNow();
    getLocation();
};
</script>
  </body>
