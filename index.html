<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Four Pillars + XKDG</title>
    <style>
        body { font-family: Arial; text-align: center; }
        table { border-collapse: collapse; margin: 20px auto; }
        td, th { border: 1px solid #ccc; padding: 12px 8px; vertical-align: top; min-width: 100px; }
      .wood { color: #2e8b57; font-weight: bold; }
      .fire { color: #dc143c; font-weight: bold; }
      .earth { color: #b8860b; font-weight: bold; }
      .metal { color: #708090; font-weight: bold; }
      .water { color: #1e90ff; font-weight: bold; }
      .stem-cn,.branch-cn { font-size: 32px; font-weight: bold; }
      .hex { font-size: 14px; line-height: 1.2; }
    </style>
</head>
<body>
    <h1>Four Pillars + XKDG</h1>
    <button onclick="calculate()">Calculate Now</button>

    <table>
        <tr style="background:#e8e8e8; font-weight:bold;">
            <td></td><td>Hour ж—¶</td><td>Day ж—Ҙ</td><td>Month жңҲ</td><td>Year е№ҙ</td>
        </tr>
        <tr style="background:#ffe6e6;">
            <td>Time</td>
            <td id="h-time"></td><td id="d-time"></td>
            <td id="m-time"></td><td id="y-time"></td>
        </tr>
        <tr>
            <td style="font-weight:bold;">Stem</td>
            <td><div id="h-stem-cn" class="stem-cn"></div><div id="h-stem-en"></div><div id="h-stem-el"></div></td>
            <td><div id="d-stem-cn" class="stem-cn"></div><div id="d-stem-en"></div><div id="d-stem-el"></div></td>
            <td><div id="m-stem-cn" class="stem-cn"></div><div id="m-stem-en"></div><div id="m-stem-el"></div></td>
            <td><div id="y-stem-cn" class="stem-cn"></div><div id="y-stem-en"></div><div id="y-stem-el"></div></td>
        </tr>
        <tr>
            <td style="font-weight:bold;">Branch</td>
            <td><div id="h-branch-cn" class="branch-cn"></div><div id="h-branch-en"></div><div id="h-branch-an"></div><div id="h-branch-el"></div></td>
            <td><div id="d-branch-cn" class="branch-cn"></div><div id="d-branch-en"></div><div id="d-branch-an"></div><div id="d-branch-el"></div></td>
            <td><div id="m-branch-cn" class="branch-cn"></div><div id="m-branch-en"></div><div id="m-branch-an"></div><div id="m-branch-el"></div></td>
            <td><div id="y-branch-cn" class="branch-cn"></div><div id="y-branch-en"></div><div id="y-branch-an"></div><div id="y-branch-el"></div></td>
        </tr>
        <tr>
            <td style="font-weight:bold;">Hex</td>
            <td id="h-hex" class="hex"></td><td id="d-hex" class="hex"></td>
            <td id="m-hex" class="hex"></td><td id="y-hex" class="hex"></td>
        </tr>
    </table>

<script src="lunar.min.js"></script>
<script src="xkdg_hex.js"></script>
<script>
// MAPPATURA CINESE -> PINYIN. QUESTA ГҲ LA CHIAVE.
const GAN_MAP = {'з”І':'Jia','д№ҷ':'Yi','дёҷ':'Bing','дёҒ':'Ding','жҲҠ':'Wu','е·ұ':'Ji','еәҡ':'Geng','иҫӣ':'Xin','еЈ¬':'Ren','зҷё':'Gui'};
const ZHI_MAP = {'еӯҗ':'Zi','дё‘':'Chou','еҜ…':'Yin','еҚҜ':'Mao','иҫ°':'Chen','е·і':'Si','еҚҲ':'Wu','жңӘ':'Wei','з”і':'Shen','й…ү':'You','жҲҢ':'Xu','дәҘ':'Hai'};
const STEMS = { 'Jia':'Yang Wood','Yi':'Yin Wood','Bing':'Yang Fire','Ding':'Yin Fire','Wu':'Yang Earth','Ji':'Yin Earth','Geng':'Yang Metal','Xin':'Yin Metal','Ren':'Yang Water','Gui':'Yin Water' };
const BRANCHES = { 'Zi':'Yang Water Rat','Chou':'Yin Earth Ox','Yin':'Yang Wood Tiger','Mao':'Yin Wood Rabbit','Chen':'Yang Earth Dragon','Si':'Yin Fire Snake','Wu':'Yang Fire Horse','Wei':'Yin Earth Goat','Shen':'Yang Metal Monkey','You':'Yin Metal Rooster','Xu':'Yang Earth Dog','Hai':'Yin Water Pig' };
const ELEMENTS = { 'Jia':'wood','Yi':'wood','Bing':'fire','Ding':'fire','Wu':'earth','Ji':'earth','Geng':'metal','Xin':'metal','Ren':'water','Gui':'water','Zi':'water','Chou':'earth','Yin':'wood','Mao':'wood','Chen':'earth','Si':'fire','Wu':'fire','Wei':'earth','Shen':'metal','You':'metal','Xu':'earth','Hai':'water' };

function getSolarTime(date, lng=12.4964) {
    const utc = date.getTime() + date.getTimezoneOffset()*60000;
    const solar = new Date(utc + lng*3600000/15);
    return {hour: solar.getHours(), minute: solar.getMinutes()};
}

function calculate() {
    const now = new Date();
    const solarTime = getSolarTime(now);

    const solar = Solar.fromDate(new Date(now.getFullYear(), now.getMonth(), now.getDate(), solarTime.hour, solarTime.minute));
    const lunar = solar.getLunar();

    // Prendo i caratteri cinesi e li converto in pinyin
    const yearGZ = lunar.getYearInGanZhi(); // "дёҷеҚҲ"
    const monthGZ = lunar.getMonthInGanZhi(); // "еЈ¬иҫ°"
    const dayGZ = lunar.getDayInGanZhi(); // "иҫӣжңӘ"
    const hourGZ = lunar.getTimeInGanZhi(); // "зҷёе·і"

    const yearGan = GAN_MAP[yearGZ.charAt(0)]; // "дёҷ" -> "Bing"
    const yearZhi = ZHI_MAP[yearGZ.charAt(1)]; // "еҚҲ" -> "Wu"
    const monthGan = GAN_MAP[monthGZ.charAt(0)];
    const monthZhi = ZHI_MAP[monthGZ.charAt(1)];
    const dayGan = GAN_MAP[dayGZ.charAt(0)];
    const dayZhi = ZHI_MAP[dayGZ.charAt(1)];
    const hourGan = GAN_MAP[hourGZ.charAt(0)];
    const hourZhi = ZHI_MAP[hourGZ.charAt(1)];

    const dateStr = now.getDate()+'/'+(now.getMonth()+1)+'/'+now.getFullYear();
    const timeStr = String(solarTime.hour).padStart(2,'0')+':'+String(solarTime.minute).padStart(2,'0');

document.getElementById('h-time').textContent = timeStr; // Solo ora solare vera
document.getElementById('d-time').textContent = dateStr; // 27/4/2026
document.getElementById('m-time').textContent = ''; // Vuoto, non serve
document.getElementById('y-time').textContent = ''; // Vuoto, non serve
    
    const data = [
        {gan: hourGan, zhi: hourZhi, gzCN: hourGZ, prefix: 'h'},
        {gan: dayGan, zhi: dayZhi, gzCN: dayGZ, prefix: 'd'},
        {gan: monthGan, zhi: monthZhi, gzCN: monthGZ, prefix: 'm'},
        {gan: yearGan, zhi: yearZhi, gzCN: yearGZ, prefix: 'y'}
    ];

    data.forEach(item => {
    const stem = item.gan; // "Bing"
    const branch = item.zhi; // "Wu"
    const stemCN = item.gzCN.charAt(0); // "дёҷ"
    const branchCN = item.gzCN.charAt(1); // "еҚҲ"

    // STEM
    document.getElementById(item.prefix+'-stem-cn').textContent = stemCN;
    document.getElementById(item.prefix+'-stem-cn').className = 'stem-cn '+ELEMENTS[stem];
    document.getElementById(item.prefix+'-stem-en').textContent = stem;
    document.getElementById(item.prefix+'-stem-el').textContent = STEMS[stem];
    document.getElementById(item.prefix+'-stem-el').className = ELEMENTS[stem];

    // BRANCH
    const branchData = BRANCHES[branch].split(' ');
    document.getElementById(item.prefix+'-branch-cn').textContent = branchCN;
    document.getElementById(item.prefix+'-branch-cn').className = 'branch-cn '+ELEMENTS[branch];
    document.getElementById(item.prefix+'-branch-en').textContent = branch;
    document.getElementById(item.prefix+'-branch-an').textContent = branchData[2];
    document.getElementById(item.prefix+'-branch-el').textContent = branchData[0]+' '+branchData[1];
    document.getElementById(item.prefix+'-branch-el').className = ELEMENTS[branch];
});
    if (typeof getXKDGHexagram === 'function') {
        document.getElementById('h-hex').innerHTML = getXKDGHexagram(hourGan, hourZhi);
        document.getElementById('d-hex').innerHTML = getXKDGHexagram(dayGan, dayZhi);
        document.getElementById('m-hex').innerHTML = getXKDGHexagram(monthGan, monthZhi);
        document.getElementById('y-hex').innerHTML = getXKDGHexagram(yearGan, yearZhi);
    }
}

window.onload = calculate;
</script>
</body>
</html>
