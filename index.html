<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XKDG Bazi Calculator - True Solar Time</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');
        :root { --wood: #1a8a1a; --fire: #d40000; --earth: #8b5a2b; --metal: #555; --water: #0000cd; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 8px; width: 100%; max-width: 850px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        
        /* Riga 1: Controlli principali */
        .inputs-row { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; align-items: center; flex-wrap: wrap; }
        
        /* Riga 2: Parametri Geografici - Ora forzata sotto */
        .geo-row { 
            display: flex; 
            gap: 20px; 
            margin-bottom: 25px; 
            justify-content: center; 
            align-items: center; 
            background: #fdfdfd; 
            padding: 12px; 
            border-radius: 4px; 
            border: 1px solid #eee;
            width: auto;
            align-self: center;
        }
        
        input, button { padding: 8px 12px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; }
        label { font-size: 12px; font-weight: bold; color: #666; margin-right: 5px; }
        
        .btn-calc { background: #2d2d2d; color: white; cursor: pointer; border: none; font-weight: bold; padding: 8px 25px; }
        .btn-calc:hover { background: #000; }
        .btn-tool { background: #f0f0f0; color: #333; cursor: pointer; border: 1px solid #bbb; font-weight: 600; }

        .chart { display: grid; grid-template-columns: repeat(4, 1fr); border: 2px solid #bbb; background: #fff; }
        .pillar { display: flex; flex-direction: column; border-right: 2px solid #bbb; text-align: center; }
        .pillar:last-child { border-right: none; }
        
        .header { background: #fce4ec; padding: 12px; font-weight: bold; color: #880e4f; border-bottom: 2px solid #bbb; letter-spacing: 1px; }
        .cell { padding: 15px 5px; min-height: 100px; }
        .hanzi { font-family: 'Ma Shan Zheng', cursive; font-size: 64px; line-height: 1.1; display: block; }
        .element-label { font-size: 11px; text-transform: uppercase; opacity: 0.7; font-weight: bold; margin-top: 5px; display: block;}
        
        .hex-section { padding: 20px 5px; border-top: 2px solid #bbb; display: flex; flex-direction: column; align-items: center; min-height: 150px; }
        .hex-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin-left: 20px; }
        .hex-icon { font-size: 80px; color: #000; line-height: 1; }
        .data-column { display: flex; flex-direction: column; justify-content: space-around; height: 80px; width: 35px; font-weight: bold; font-size: 16px; }
        .hex-info { margin-top: 10px; font-size: 13px; font-weight: bold; color: #333; text-align: center; }
        
        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); }
        .metal { color: var(--metal); } .water { color: var(--water); }
        
        .solar-badge { background: #fff1f0; color: #d40000; padding: 4px 10px; border-radius: 15px; border: 1px solid #ffa39e; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="inputs-row">
        <button class="btn-tool" onclick="setNow()">NOW</button>
        <button class="btn-tool" onclick="getGPS()">GPS</button>
        <input type="date" id="date">
        <input type="time" id="time">
        <button class="btn-calc" onclick="calculateBazi()">CALCULATE</button>
    </div>

    <div class="geo-row">
        <div>
            <label>UTC OFFSET:</label>
            <input type="number" id="utc-offset" value="1" step="1" style="width: 55px;">
        </div>
        <div>
            <label>LONGITUDE:</label>
            <input type="number" id="longitude" value="12.49" step="0.01" style="width: 85px;">
        </div>
        <div id="solar-time-display" class="solar-badge">True Solar: --:--</div>
    </div>

    <div class="chart">
        <div class="pillar" id="p-hour"><div class="header">HOUR</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-day"><div class="header">DAY</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-month"><div class="header">MONTH</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-year"><div class="header">YEAR</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
    </div>
</div>

<script>
const ELEMENTS_EN = { '甲': 'wood', '乙': 'wood', '丙': 'fire', '丁': 'fire', '戊': 'earth', '己': 'earth', '庚': 'metal', '辛': 'metal', '壬': 'water', '癸': 'water', '子': 'water', '丑': 'earth', '寅': 'wood', '卯': 'wood', '辰': 'earth', '巳': 'fire', '午': 'fire', '未': 'earth', '申': 'metal', '酉': 'metal', '戌': 'earth', '亥': 'water' };

function setNow() {
    const now = new Date();
    document.getElementById('date').value = now.toISOString().split('T')[0];
    document.getElementById('time').value = now.toTimeString().slice(0,5);
    calculateBazi();
}

function getGPS() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
            document.getElementById('longitude').value = pos.coords.longitude.toFixed(2);
            calculateBazi();
        });
    }
}

function calculateBazi() {
    const dVal = document.getElementById('date').value;
    const tVal = document.getElementById('time').value || "00:00";
    const lon = parseFloat(document.getElementById('longitude').value);
    const utc = parseFloat(document.getElementById('utc-offset').value);
    
    if (!dVal) return;

    // Calcolo Ora Solare Vera
    const standardMeridian = utc * 15;
    const offsetMinutes = (lon - standardMeridian) * 4;
    let baseDate = new Date(`${dVal}T${tVal}`);
    let solarDate = new Date(baseDate.getTime() + offsetMinutes * 60000);
    
    document.getElementById('solar-time-display').textContent = "True Solar: " + solarDate.toTimeString().slice(0,5);

    const solar = Solar.fromDate(solarDate);
    const lunar = solar.getLunar();
    const eightChar = lunar.getEightChar();

    updatePillar('p-year', eightChar.getYearGan(), eightChar.getYearZhi(), '䷛', '28 Da Guo', '4', '3', eightChar.getYearGan()+eightChar.getYearZhi());
    updatePillar('p-month', eightChar.getMonthGan(), eightChar.getMonthZhi(), '䷙', '26 Da Chu', '6', '4', eightChar.getMonthGan()+eightChar.getMonthZhi());
    updatePillar('p-day', eightChar.getDayGan(), eightChar.getDayZhi(), '䷅', '06 Song', '9', '3', eightChar.getDayGan()+eightChar.getDayZhi());
    updatePillar('p-hour', eightChar.getTimeGan(), eightChar.getTimeZhi(), '䷯', '48 Jing', '7', '6', eightChar.getTimeGan()+eightChar.getTimeZhi());
}

function updatePillar(id, stem, branch, hexIcon, hexName, n1, n2, sideZh) {
    const elS = ELEMENTS_EN[stem];
    const elB = ELEMENTS_EN[branch];
    const p = document.getElementById(id);
    p.querySelector('.stem').innerHTML = `<span class="hanzi ${elS}">${stem}</span><span class="element-label">- ${elS} -</span>`;
    p.querySelector('.branch').innerHTML = `<span class="hanzi ${elB}">${branch}</span><span class="element-label">- ${elB} -</span>`;
    p.querySelector('.hex-section').innerHTML = `<div class="hex-wrapper"><div class="hex-icon">${hexIcon}</div><div class="data-column"><div>${n1}</div><div style="font-size:12px;">${sideZh}</div><div>${n2}</div></div></div><div class="hex-info">${hexName}</div>`;
}

window.onload = setNow;
</script>
</body>
</html>
