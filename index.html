.loader{display:none;text-align:center;padding:20px}
.error{color:#E74C3C;font-size:14px;margin-top:8px;display:none}
.small{font-size:12px;color:#8a8d91;margin-top:8px}

const TIANGAN = ['jia','yi','bing','ding','wu','ji','geng','xin','ren','gui'];
const DIZHI = ['zi','chou','yin','mao','chen','si','wu','wei','shen','you','xu','hai'];
const REF_DATETIME = new Date('1984-02-04T23:00:00');
const JIEQI_GIORNI = [4,6,6,5,6,6,7,8,8,7,7];
const TAG_MAP = {Oro:'oro', Viola:'viola', Lilla:'lilla', Verde:'verde', Nessuno:'grigio'};

function dataOccidentaleAJiaZi(dataStr, oraStr){
  let dt = new Date(dataStr + 'T' + oraStr + ':00');
  let m = dt.getMonth()+1, d = dt.getDate();
  if((m>3||(m===3&&d>=25)) && (m<10||(m===10&&d<25))) dt.setHours(dt.getHours()-1);
  dt.setHours(dt.getHours()-1);

  let annoBazi = dt.getFullYear();
  let lichun = new Date(dt.getFullYear(), 1, 4);
  if(dt < lichun) annoBazi--;
  let diffAnni = annoBazi - 1984;
  let pilastroAnno = TIANGAN[(diffAnni%10+10)%10] + '_' + DIZHI[(diffAnni%12+12)%12];

  let meseSolare = dt.getMonth()-1; if(meseSolare<0) meseSolare=11;
  if(dt.getDate() < JIEQI_GIORNI[meseSolare]) meseSolare = (meseSolare-1+12)%12;
  let ganAnnoIdx = (diffAnni%10+10)%10;
  let ganMeseIdx = (ganAnnoIdx*2 + meseSolare)%10;
  let zhiMeseIdx = (meseSolare+2)%12;
  let pilastroMese = TIANGAN[ganMeseIdx] + '_' + DIZHI[zhiMeseIdx];

  let diffGiorni = Math.floor((dt - REF_DATETIME)/86400000);
  let idxGiorno = diffGiorni%60; if(idxGiorno<0) idxGiorno+=60;
  let pilastroGiorno = TIANGAN[idxGiorno%10] + '_' + DIZHI[idxGiorno%12];

  let oraDec = dt.getHours() + dt.getMinutes()/60;
  let zhiOraIdx = 0;
  if(oraDec<1||oraDec>=23) zhiOraIdx=0; else zhiOraIdx=Math.floor((oraDec+1)/2);
  let ganGiornoIdx = idxGiorno%10;
  let ganOraIdx = (ganGiornoIdx*2 + zhiOraIdx)%10;
  let pilastroOra = TIANGAN[ganOraIdx] + '_' + DIZHI[zhiOraIdx];

  return [pilastroAnno, pilastroMese, pilastroGiorno, pilastroOra];
}

function risolviFamiglia(jz, pilastri){
  let famiglie = DATI.jiazi[jz].famiglie;
  if(famiglie.length===1) return famiglie[0].codice;
  for(let fam of famiglie){
    let codice = fam.codice;
    let pPadre = DATI.genitori_P[codice].padre;
    let pMadre = DATI.genitori_P[codice].madre;
    if(pilastri.includes(pPadre) || pilastri.includes(pMadre)) return codice;
  }
  return null;
}

function checkBloodLink(p){
  let famiglie = p.map(x=>risolviFamiglia(x,p));
  if(famiglie.includes(null)) return [false,0,"","Ambiguous: double hexagram without P"];
  if(new Set(famiglie).size===1) return [true,10,"Oro",`Blood Link ${famiglie[0]}`];
  return [false,0,"",""];
}

function checkPureQi(n){return new Set(n).size===1 && n[0]===1;}
function checkPuroHeTu(n){for(let c of DATI.coppie_hetu){if(n.every(x=>c.includes(x))) return true;} return false;}
function checkPureAdd(n){for(let i=0;i<n.length;i++){for(let j=i+1;j<n.length;j++){if([5,10,15].includes(n[i]+n[j])) return true;}} return false;}
function giornoRiceveShengKeIn(n){let ng=n[2], altri=[n[0],n[1],n[3]];for(let a of altri){if([1,6].includes(ng)&&[4,9].includes(a))return true;if([3,8].includes(ng)&&[1,6,4,9].includes(a))return true;if([2,7].includes(ng)&&[3,8,1,6].includes(a))return true;if([4,9].includes(ng)&&[2,7].includes(a))return true;}return false;}
function checkHeTuSemplice(n){let count=0;for(let c of DATI.coppie_hetu){if(n.filter(x=>c.includes(x)).length>=2)count++;}return count>=2&&giornoRiceveShengKeIn(n);}

function valutaNumeri(n){
  if(checkPureQi(n)) return [10,"Oro","Pure Qi"];
  if(checkPuroHeTu(n)) return [7,"Viola","Pure HeTu"];
  if(checkHeTuSemplice(n)) return [6,"Lilla","Simple HeTu"];
  if(checkPureAdd(n)) return [5,"Verde","Pure Add"];
  return [0,"",""];
}

function calcola(){
  document.getElementById('error').style.display='none';
  let data = document.getElementById('data').value;
  let ora = document.getElementById('ora').value;
  let nascita = document.getElementById('nascita').value;
  if(!data||!ora){document.getElementById('error').textContent='Please enter date and time';document.getElementById('error').style.display='block';return;}

  document.getElementById('loader').style.display='block';
  document.getElementById('risultato').style.display='none';

  setTimeout(()=>{
    let [anno,mese,giorno,oraJZ] = dataOccidentaleAJiaZi(data, ora);
    let pilastri = [anno,mese,giorno,oraJZ];

    let [blAttivo,blPunti,blTag,blNote] = checkBloodLink(pilastri);

    let numElem = [getNumeri(anno,'elemento')[0],getNumeri(mese,'elemento')[0],getNumeri(giorno,'elemento')[0],getNumeri(oraJZ,'elemento')[0]];
    let [elemPunti,elemTag,elemNote] = valutaNumeri(numElem);

    let numPer = [getNumeri(anno,'periodi')[0],getNumeri(mese,'periodi')[0],getNumeri(giorno,'periodi')[0],getNumeri(oraJZ,'periodi')[0]];
    let [perPunti,perTag,perNote] = valutaNumeri(numPer);

    let risultati = [[blPunti,blTag,`Blood Link: ${blNote}`],[elemPunti,elemTag,`Element: ${elemNote}`],[perPunti,perTag,`Periods: ${perNote}`]];
    let [punteggio,tag,_] = risultati.reduce((a,b)=>a[0]>=b[0]?a:b);
    let noteFinali = risultati.filter(r=>r[2]&&!r[2].includes("Ambiguous")&&!r[2].endsWith(": ")).map(r=>r[2]);

    let massPersonale = false;
    if(nascita){
      let [annoN,,,,] = dataOccidentaleAJiaZi(nascita,"12:00");
      let numAnnoNascita = getNumeri(annoN,'elemento');
      let numGiornoElem = getNumeri(giorno,'elemento');
      let combo = numAnnoNascita.concat(numGiornoElem);
      if(checkPureAdd(combo)||checkPuroHeTu(combo)||checkHeTuSemplice(combo)) massPersonale=true;
    }

    let colore = TAG_MAP[tag] || 'grigio';
    let res = document.getElementById('risultato');
    res.className = `card risultato ${colore}`;
    res.innerHTML = `
      <div class="data-occ">${data} ${ora}</div>
      <div class="pilastri">${pilastri.join(' ').replace(/_/g,' ')}</div>
      <div class="punteggio">${punteggio}</div>
      <span class="badge ${colore}">${tag||"None"}</span>
      ${massPersonale?'<span class="badge personale">PERSONAL MAXIMUM</span>':''}
      <div class="note">${noteFinali.join(' | ')||'No condition met'}</div>
    `;
    document.getElementById('loader').style.display='none';
    res.style.display='block';
  },100);
}

window.onload = ()=>{
  let oggi = new Date();
  document.getElementById('data').value = oggi.toISOString().split('T')[0];
  document.getElementById('ora').value = oggi.toTimeString().slice(0,5);
};
</script>
