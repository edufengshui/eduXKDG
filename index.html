<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XKDG Bazi Calculator - Authentic Style</title>
    <style>
        /* Importazione font calligrafico raffinato */
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');

        :root {
            --wood: #1a8a1a; --fire: #d40000; --earth: #8b5a2b;
            --metal: #666666; --water: #0000cd;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 850px; }
        
        /* Stile dei Caratteri Cinesi (Hanzi) */
        .hanzi { 
            font-family: 'Ma Shan Zheng', "Kaiti SC", "STKaiti", serif; 
            font-size: 64px; 
            line-height: 1;
            display: block;
            margin-bottom: 5px;
            /* Effetto ombreggiatura come da immagine */
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
            transition: transform 0.2s;
        }

        .pillar { text-align: center; border-right: 1px solid #e0e0e0; padding: 10px; }
        .pillar:last-child { border-right: none; }
        .chart { display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid #ccc; border-radius: 4px; }

        .label-eng { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 2px; }
        .label-attr { font-size: 13px; color: #666; text-transform: capitalize; }

        /* Colori Elementi */
        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); }
        .metal { color: var(--metal); } .water { color: var(--water); }

        /* XKDG Hexagram Section */
        .hex-wrapper { margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .hex-icon { font-size: 80px; color: #222; }
        .data-col { display: flex; flex-direction: column; justify-content: space-between; height: 80px; font-weight: bold; font-size: 20px; }
        .side-pillar { font-size: 14px; line-height: 1.2; font-family: 'Ma Shan Zheng', serif; }
    </style>
</head>
<body>

<div class="container">
    <div class="chart">
        <div class="pillar">
            <div style="color:#888; font-size:12px; font-weight:bold; margin-bottom:10px;">HOUR</div>
            <span class="hanzi wood">乙</span>
            <div class="label-eng">Yi</div>
            <div class="label-attr">- Wood -</div>
            <br>
            <span class="hanzi earth" style="color:#b87333;">未</span>
            <div class="label-eng">Wei</div>
            <div class="label-attr">Goat / - Earth -</div>
        </div>
        
        </div>
</div>

</body>
</html>
