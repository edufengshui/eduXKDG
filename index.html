<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>XKDG Bazi Chart - FIXED</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; background: #f0f0f0; }
        .inputs { margin-bottom: 25px; }
        input { padding: 10px; margin: 5px; font-size: 16px; }
        button { padding: 12px 40px; background: #0078d4; color: white; border: none; font-size: 16px; cursor: pointer; }
        .chart { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 900px; margin: 30px auto; }
        .pillar { background: white; padding: 25px 10px; border: 1px solid #ccc; border-radius: 4px; }
        .pillar .label { font-weight: bold; color: #555; margin-bottom: 15px; font-size: 18px; }
        .pillar .stem { font-size: 36px; font-weight: bold; text-transform: capitalize; line-height: 1.2; }
        .pillar .branch { font-size: 28px; color: #222; text-transform: capitalize; line-height: 1.2; }
    </style>
</head>
<body>
    <h1>XKDG Bazi Calculator</h1>
    <div class="inputs">
        Date: <input type="date" id="date" value="2026-04-23">
        Time: <input type="time" id="time" value="14:00">
        <button onclick="setNow()">NOW</button> <button onclick="calc()">Calculate XKDG</button>
    </div>
    <div style="margin: 15px 0; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
    <label style="display:block; margin-bottom:8px;">
        <input type="checkbox" id="useTrueSolar" onchange="toggleSolarUI()"> 
        Usa Ora Solare Vera per Hour Branch
    </label>
    
    <div id="solarUI" style="display:none;">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <div style="flex:1;">
                <label>Time Zone</label>
                <select id="tzOffset" style="width:100%; padding:6px;">
                    <option value="-12">UTC-12</option>
                    <option value="-11">UTC-11</option>
                    <option value="-10">UTC-10</option>
                    <option value="-9">UTC-9</option>
                    <option value="-8">UTC-8</option>
                    <option value="-7">UTC-7</option>
                    <option value="-6">UTC-6</option>
                    <option value="-5">UTC-5</option>
                    <option value="-4">UTC-4</option>
                    <option value="-3">UTC-3</option>
                    <option value="-2">UTC-2</option>
                    <option value="-1">UTC-1</option>
                    <option value="0" selected>UTC+0</option>
                    <option value="1">UTC+1</option>
                    <option value="2">UTC+2</option>
                    <option value="3">UTC+3</option>
                    <option value="4">UTC+4</option>
                    <option value="5">UTC+5</option>
                    <option value="6">UTC+6</option>
                    <option value="7">UTC+7</option>
                    <option value="8">UTC+8</option>
                    <option value="9">UTC+9</option>
                    <option value="10">UTC+10</option>
                    <option value="11">UTC+11</option>
                    <option value="12">UTC+12</option>
                </select>
            </div>
            <div style="flex:1;">
                <label>Longitude</label>
                <input type="number" id="longitude" value="0" step="0.01" style="width:100%; padding:6px;">
            </div>
            <div style="flex:1;">
                <label>DST</label>
                <select id="dst" style="width:100%; padding:6px;">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>
        </div>
        <div style="display:flex; gap:10px;">
            <button type="button" onclick="saveSolar()" style="flex:1; background:#007bff; color:white; padding:8px; border:none; border-radius:4px;">Save</button>
            <button type="button" onclick="resetSolar()" style="flex:1; background:#007bff; color:white; padding:8px; border:none; border-radius:4px;">Reset</button>
            <button type="button" onclick="autoSolar()" style="flex:1; background:#007bff; color:white; padding:8px; border:none; border-radius:4px;">Auto</button>
        </div>
        <div id="solarInfo" style="font-size:12px; margin-top:8px; color:#555;"></div>
    </div>
</div>
    <div class="chart">
        <div class="pillar">
            <div class="label">Hour</div>
            <div class="stem" id="h-stem">-</div>
            <div class="branch" id="h-branch">-</div>
        </div>
        <div class="pillar">
            <div class="label">Day</div>
            <div class="stem" id="d-stem">-</div>
            <div class="branch" id="d-branch">-</div>
        </div>
        <div class="pillar">
            <div class="label">Month</div>
            <div class="stem" id="m-stem">-</div>
            <div class="branch" id="m-branch">-</div>
        </div>
        <div class="pillar">
            <div class="label">Year</div>
            <div class="stem" id="y-stem">-</div>
            <div class="branch" id="y-branch">-</div>
        </div>
 <script>
// XKDG Bazi - NESSUN FUSO ORARIO. Solo data locale utente.
const STEMS = ['Jia','Yi','Bing','Ding','Wu','Ji','Geng','Xin','Ren','Gui'];
const BRANCHES = ['Zi','Chou','Yin','Mao','Chen','Si','Wu','Wei','Shen','You','Xu','Hai'];

// 1. DAY - Ancora XKDG: 23/04/2026 è Ding Mao ovunque
const REF_DATE = new Date(2026, 3, 23);
const REF_DAY_GZ = 3;
function getDayGanzhi(inputDate) {
    const msPerDay = 86400000;
    const dayStart = new Date(inputDate.getFullYear(), inputDate.getMonth(), inputDate.getDate());
    const daysDiff = Math.round((dayStart - REF_DATE) / msPerDay);
    const index = (REF_DAY_GZ + daysDiff) % 60;
    const corrected = index < 0? index + 60 : index;
    return {
        stem: STEMS[corrected % 10],
        branch: BRANCHES[corrected % 12]
    };
}

// 2. HOUR - XKDG 2 ore
function getHourGanzhi(hour, dayStem) {
    const branchIndex = hour === 23? 0 : Math.floor((hour + 1) / 2);
    const dayStemIndex = STEMS.indexOf(dayStem);
    const hourStemIndex = (dayStemIndex * 2 + branchIndex) % 10;
    return {
        stem: STEMS[hourStemIndex],
        branch: BRANCHES[branchIndex]
    };
}

// 3. YEAR - Li Chun
function getLiChun(year) {
    const base = new Date(year, 1, 4); 
    const dayOffset = Math.floor((year - 2000) * 0.2422) - Math.floor((year - 2000) / 4);
    base.setDate(base.getDate() + dayOffset);
    base.setHours(10, 30);
    return base;
}

function getYearGanzhi(date) {
    const year = date.getFullYear();
    const liChun = getLiChun(year);
    const effectiveYear = date < liChun? year - 1 : year;
    const jiaZiYear = 1984;
    const offset = (effectiveYear - jiaZiYear) % 60;
    const yearIndex = offset < 0? offset + 60 : offset;
    return {
        stem: STEMS[yearIndex % 10],
        branch: BRANCHES[yearIndex % 12]
    };
}

// 4. MONTH - JieQi
function getJieQiDates(year) {
    return [
        new Date(year, 1, 4), // 1. Li Chun, Feb
        new Date(year, 2, 6), // 2. Jing Zhe, Mar 
        new Date(year, 3, 5), // 3. Qing Ming, Apr
        new Date(year, 4, 6), // 4. Li Xia, Mag
        new Date(year, 5, 6), // 5. Mang Zhong, Giu
        new Date(year, 6, 7), // 6. Xiao Shu, Lug
        new Date(year, 7, 8), // 7. Li Qiu, Ago
        new Date(year, 8, 8), // 8. Bai Lu, Set
        new Date(year, 9, 8), // 9. Han Lu, Ott
        new Date(year, 10, 7), // 10. Li Dong, Nov
        new Date(year, 11, 7), // 11. Da Xue, Dic
        new Date(year, 0, 6) // 12. Xiao Han, Gen
    ];
}

function getMonthGanzhi(date, yearStem) {
    const year = date.getFullYear();
    const jieQiDates = getJieQiDates(year);
    let monthBranchIndex = 2; // Yin
    
    for (let i = 0; i < 12; i++) {
        const nextJieQi = i === 11? getJieQiDates(year + 1)[0] : jieQiDates[i + 1];
        if (date >= jieQiDates[i] && date < nextJieQi) {
            monthBranchIndex = (2 + i) % 12;
            break;
        }
    }
    if (date < jieQiDates[0]) monthBranchIndex = 1; // Chou
    
    const yearStemIndex = STEMS.indexOf(yearStem);
    const monthStemIndex = (yearStemIndex * 2 + monthBranchIndex) % 10;
    
    return {
        stem: STEMS[monthStemIndex],
        branch: BRANCHES[monthBranchIndex]
    };
}
// TRUE SOLAR TIME XKDG
function toggleSolarUI() {
    document.getElementById('solarUI').style.display = 
        document.getElementById('useTrueSolar').checked ? 'block' : 'none';
    calc();
}

function saveSolar() {
    localStorage.setItem('xkdg_tz', document.getElementById('tzOffset').value);
    localStorage.setItem('xkdg_lon', document.getElementById('longitude').value);
    localStorage.setItem('xkdg_dst', document.getElementById('dst').value);
    calc();
}

function resetSolar() {
    document.getElementById('tzOffset').value = 0;
    document.getElementById('longitude').value = 0;
    document.getElementById('dst').value = 0;
    calc();
}

function autoSolar() {
    const tz = -new Date().getTimezoneOffset() / 60;
    document.getElementById('tzOffset').value = tz;
    // DST auto: se offset estivo != offset gennaio
    const jan = new Date(new Date().getFullYear(), 0, 1);
    const jul = new Date(new Date().getFullYear(), 6, 1);
    const isDST = jan.getTimezoneOffset() !== jul.getTimezoneOffset() && 
                  new Date().getTimezoneOffset() === Math.min(jan.getTimezoneOffset(), jul.getTimezoneOffset());
    document.getElementById('dst').value = isDST ? 1 : 0;
    
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            document.getElementById('longitude').value = pos.coords.longitude.toFixed(2);
            calc();
        }, () => {
            alert('GPS negato. Inserisci longitudine manuale.');
            calc();
        });
    }
}

// Carica valori salvati
window.addEventListener('load', () => {
    document.getElementById('tzOffset').value = localStorage.getItem('xkdg_tz') || 1; // Default CET
    document.getElementById('longitude').value = localStorage.getItem('xkdg_lon') || 16.37; // Vienna
    document.getElementById('dst').value = localStorage.getItem('xkdg_dst') || 0;
});

function getEquationOfTime(date) {
    const start = new Date(date.getFullYear(), 0, 0);
    const diff = date - start;
    const dayOfYear = Math.floor(diff / 86400000);
    const B = 2 * Math.PI * (dayOfYear - 81) / 365;
    return 9.87 * Math.sin(2*B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B); // minuti
}

function getTrueSolarTime(year, month, day, hour, minute) {
    if (!document.getElementById('useTrueSolar').checked) return {hour, minute};
    
    const tz = parseInt(document.getElementById('tzOffset').value);
    const lon = parseFloat(document.getElementById('longitude').value);
    const dst = parseInt(document.getElementById('dst').value);
    
    const date = new Date(year, month - 1, day, hour, minute);
    
    // 1. Togli DST se presente
    const standardMinutes = hour * 60 + minute - (dst * 60);
    
    // 2. Equazione del tempo - cambia ogni giorno
    const eot = getEquationOfTime(date);
    
    // 3. Correzione longitudine: 4 min per grado dal meridiano del fuso
    const tzMeridian = tz * 15; // 15° per ogni ora UTC
    const lonCorrection = 4 * (lon - tzMeridian);
    
    // 4. Ora solare vera in minuti
    let solarMinutes = standardMinutes + eot + lonCorrection;
    
    // Normalizza 0-1440
    while (solarMinutes < 0) solarMinutes += 1440;
    while (solarMinutes >= 1440) solarMinutes -= 1440;
    
    const solarHour = Math.floor(solarMinutes / 60);
    const solarMin = Math.floor(solarMinutes % 60);
    
    // Mostra info
    document.getElementById('solarInfo').innerText = 
        `Solare vera: ${String(solarHour).padStart(2,'0')}:${String(solarMin).padStart(2,'0')} | EqT: ${eot.toFixed(1)}min | LonCorr: ${lonCorrection.toFixed(1)}min`;
    
    return {hour: solarHour, minute: solarMin};
}
// 5. CALC - Usa tutte le funzioni nuove
function calc() {
    const dateInput = document.getElementById('date').value;
    const timeInput = document.getElementById('time').value;
    if (!dateInput ||!timeInput) return;
    const [year, month, day] = dateInput.split('-').map(Number);
    const [hour, minute] = timeInput.split(':').map(Number);
    
    // NUOVO: calcola ora solare vera per Hour Branch
    const solar = getTrueSolarTime(year, month, day, hour, minute);
    
    const baziDate = new Date(year, month - 1, day);
    const yearGZ = getYearGanzhi(baziDate);
    const monthGZ = getMonthGanzhi(baziDate, yearGZ.stem);
    const dayGZ = getDayGanzhi(baziDate);
    const hourGZ = getHourGanzhi(solar.hour, dayGZ.stem); // USA solar.hour invece di hour
    
    document.getElementById('h-stem').innerText = hourGZ.stem;
    document.getElementById('h-branch').innerText = hourGZ.branch;
    document.getElementById('d-stem').innerText = dayGZ.stem;
    document.getElementById('d-branch').innerText = dayGZ.branch;
    document.getElementById('m-stem').innerText = monthGZ.stem;
    document.getElementById('m-branch').innerText = monthGZ.branch;
    document.getElementById('y-stem').innerText = yearGZ.stem;
    document.getElementById('y-branch').innerText = yearGZ.branch;
}
function setNow() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    document.getElementById('date').value = `${year}-${month}-${day}`;
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('time').value = `${hours}:${minutes}`;
    calc();
}

window.onload = calc;

function calc() {
    const dateInput = document.getElementById('date').value; // YYYY-MM-DD
    const timeInput = document.getElementById('time').value; // HH:MM
    if (!dateInput ||!timeInput) return;

    const [year, month, day] = dateInput.split('-').map(Number);
    const [hour, minute] = timeInput.split(':').map(Number);

    // Data locale utente. Nessun UTC, nessun Pechino.
    const baziDate = new Date(year, month - 1, day);

    // TODO: Year con Li Chun, Month con JieQi

    const yearGZ = getYearGanzhi(baziDate);
    const monthGZ = getMonthGanzhi(baziDate, yearGZ.stem);
    const dayGZ = getDayGanzhi(baziDate);
    const hourGZ = getHourGanzhi(hour, dayGZ.stem);

    document.getElementById('h-stem').innerText = hourGZ.stem;
    document.getElementById('h-branch').innerText = hourGZ.branch;
    document.getElementById('d-stem').innerText = dayGZ.stem;
    document.getElementById('d-branch').innerText = dayGZ.branch;
    document.getElementById('m-stem').innerText = monthGZ.stem;
    document.getElementById('m-branch').innerText = monthGZ.branch;
    document.getElementById('y-stem').innerText = yearGZ.stem;
    document.getElementById('y-branch').innerText = yearGZ.branch;
}
function setNow() {
    const now = new Date();
    
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    document.getElementById('date').value = `${year}-${month}-${day}`;
    
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('time').value = `${hours}:${minutes}`;
    
    calc();
}
window.onload = calc;
</script>
    </div>
</body>
</html>
