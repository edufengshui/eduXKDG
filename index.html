<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>XKDG Bazi Calculator - Dynamic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');

        :root {
            --wood: #1a8a1a; --fire: #d40000; --earth: #8b5a2b;
            --metal: #555; --water: #0000cd;
            --header-pink: #fce4ec;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 850px; }
        
        .inputs-row { display: flex; gap: 8px; margin-bottom: 25px; align-items: center; justify-content: center; }
        .inputs-row input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .inputs-row button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        
        .btn-now { background: #6c757d; }
        .btn-calc { background: #2d2d2d; }

        .chart { display: grid; grid-template-columns: repeat(4, 1fr); border: 2px solid #bbb; border-radius: 4px; overflow: hidden; background: #fff; }
        .pillar { display: flex; flex-direction: column; border-right: 2px solid #bbb; text-align: center; }
        .pillar:last-child { border-right: none; }
        
        .header { background: var(--header-pink); padding: 12px; font-weight: bold; font-size: 13px; color: #880e4f; border-bottom: 2px solid #bbb; }
        .cell { padding: 15px 5px; }
        
        .hanzi { font-family: 'Ma Shan Zheng', cursive; font-size: 64px; line-height: 1.1; display: block; }
        .eng-name { font-size: 17px; font-weight: bold; margin-top: 4px; display: block; }
        .element-label { font-size: 11px; text-transform: uppercase; opacity: 0.6; font-weight: bold; }

        .hex-section { padding: 20px 5px; border-top: 2px solid #bbb; display: flex; flex-direction: column; align-items: center; }
        .hex-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin-left: 30px; }
        .hex-icon { font-size: 80px; color: #000; line-height: 1; }

        .data-column { display: flex; flex-direction: column; justify-content: space-around; align-items: center; height: 80px; width: 30px; }
        .num-xkdg { font-size: 20px; color: #000; font-weight: bold; }
        .side-pillar-small { font-size: 14px; line-height: 1.1; color: #333; font-family: 'Ma Shan Zheng', cursive; }

        /* Didascalia centrata e spostata a sinistra per bilanciare i numeri laterali */
        .hex-info { margin-top: 10px; font-size: 13px; font-weight: bold; color: #333; line-height: 1.2; text-align: center; margin-right: 30px; }

        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); }
        .metal { color: var(--metal); } .water { color: var(--water); }
    </style>
</head>
<body>

<div class="container">
    <div class="inputs-row">
        <input type="date" id="date">
        <input type="time" id="time">
        <button class="btn-now" onclick="setNow()">NOW</button>
        <button class="btn-calc" onclick="calculateBazi()">CALCULATE</button>
    </div>

    <div class="chart">
        <div class="pillar" id="p-hour"><div class="header">HOUR</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-day"><div class="header">DAY</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-month"><div class="header">MONTH</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-year"><div class="header">YEAR</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
    </div>
</div>

<script>
const STEMS = [
    {en:'Jia', zh:'甲', el:'wood'}, {en:'Yi', zh:'乙', el:'wood'},
    {en:'Bing', zh:'丙', el:'fire'}, {en:'Ding', zh:'丁', el:'fire'},
    {en:'Wu', zh:'戊', el:'earth'}, {en:'Ji', zh:'己', el:'earth'},
    {en:'Geng', zh:'庚', el:'metal'}, {en:'Xin', zh:'辛', el:'metal'},
    {en:'Ren', zh:'壬', el:'water'}, {en:'Gui', zh:'癸', el:'water'}
];

const BRANCHES = [
    {en:'Zi', zh:'子', el:'water'}, {en:'Chou', zh:'丑', el:'earth'},
    {en:'Yin', zh:'寅', el:'wood'}, {en:'Mao', zh:'卯', el:'wood'},
    {en:'Chen', zh:'辰', el:'earth'}, {en:'Si', zh:'巳', el:'fire'},
    {en:'Wu', zh:'午', el:'fire'}, {en:'Wei', zh:'未', el:'earth'},
    {en:'Shen', zh:'申', el:'metal'}, {en:'You', zh:'酉', el:'metal'},
    {en:'Xu', zh:'戌', el:'earth'}, {en:'Hai', zh:'亥', el:'water'}
];

function setNow() {
    const now = new Date();
    document.getElementById('date').value = now.toISOString().split('T')[0];
    document.getElementById('time').value = now.toTimeString().slice(0,5);
    calculateBazi();
}

function fillPillar(id, sIdx, bIdx) {
    const s = STEMS[sIdx % 10];
    const b = BRANCHES[bIdx % 12];
    const p = document.getElementById(id);
    p.querySelector('.stem').innerHTML = `<span class="hanzi ${s.el}">${s.zh}</span><span class="eng-name">${s.en}</span><span class="element-label">- ${s.el} -</span>`;
    p.querySelector('.branch').innerHTML = `<span class="hanzi ${b.el}">${b.zh}</span><span class="eng-name">${b.en}</span><span class="element-label">- ${b.el} -</span>`;
}

function calculateBazi() {
    const dateVal = document.getElementById('date').value;
    const timeVal = document.getElementById('time').value;
    if(!dateVal) return;

    const targetDate = new Date(`${dateVal}T${timeVal || '00:00'}`);
    
    // Logica di calcolo dinamica semplificata (da espandere con libreria astronomica per precisione totale)
    const baseDate = new Date('1900-01-31'); 
    const diffDays = Math.floor((targetDate - baseDate) / (24 * 3600 * 1000));

    // Calcolo Anno (Esempio per 2026: Bing Wu)
    const year = targetDate.getFullYear();
    const yearStem = (year - 4) % 10;
    const yearBranch = (year - 4) % 12;
    fillPillar('p-year', yearStem, yearBranch);

    // Calcolo Giorno (Ciclico ogni 60 giorni)
    const dayStem = (diffDays + 0) % 10;
    const dayBranch = (diffDays + 10) % 12;
    fillPillar('p-day', dayStem, dayBranch);

    // Mese e Ora (Dipendenti da Anno/Giorno)
    fillPillar('p-month', (yearStem * 2 + 2 + 3) % 10, 4); // Approssimativo Aprile
    fillPillar('p-hour', (dayStem * 2 + Math.floor(targetDate.getHours()/2)) % 10, Math.floor((targetDate.getHours()+1)/2) % 12);

    // Nota: Gli esagrammi XKDG richiedono una tavola di lookup completa 
    // Qui aggiorniamo l'interfaccia.
    updateHexagrams();
}

function updateHexagrams() {
    // Funzione placeholder per aggiornare le icone in base ai pilastri calcolati
    setHex('p-hour', '䷯', '48 Jing<br>Well', '7', '6', '乙<br>未');
    setHex('p-day', '䷅', '06 Song<br>Litigation', '9', '3', '辛<br>未');
}

function setHex(id, icon, name, numT, numB, sideZh) {
    const section = document.querySelector(`#${id} .hex-section`);
    section.innerHTML = `
        <div class="hex-wrapper">
            <div class="hex-icon">${icon}</div>
            <div class="data-column">
                <div class="num-xkdg">${numT}</div>
                <div class="side-pillar-small">${sideZh}</div>
                <div class="num-xkdg">${numB}</div>
            </div>
        </div>
        <div class="hex-info">${name}</div>
    `;
}

window.onload = setNow;
</script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XKDG Bazi Calculator - True Solar Time</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');
        :root { --wood: #1a8a1a; --fire: #d40000; --earth: #8b5a2b; --metal: #555; --water: #0000cd; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 8px; width: 100%; max-width: 850px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .inputs-row { display: flex; gap: 10px; margin-bottom: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
        .geo-row { display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; align-items: center; background: #f9f9f9; padding: 10px; border-radius: 4px; border: 1px dashed #ccc; }
        
        input, button { padding: 8px 12px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; }
        label { font-size: 12px; font-weight: bold; color: #555; }
        
        .btn-calc { background: #2d2d2d; color: white; cursor: pointer; border: none; font-weight: bold; padding: 8px 25px; }
        .btn-calc:hover { background: #000; }
        .btn-tool { background: #e0e0e0; color: #333; cursor: pointer; border: 1px solid #bbb; }

        .chart { display: grid; grid-template-columns: repeat(4, 1fr); border: 2px solid #bbb; background: #fff; }
        .pillar { display: flex; flex-direction: column; border-right: 2px solid #bbb; text-align: center; }
        .pillar:last-child { border-right: none; }
        
        .header { background: #fce4ec; padding: 12px; font-weight: bold; color: #880e4f; border-bottom: 2px solid #bbb; }
        .cell { padding: 15px 5px; min-height: 100px; }
        .hanzi { font-family: 'Ma Shan Zheng', cursive; font-size: 64px; line-height: 1.1; display: block; }
        .element-label { font-size: 11px; text-transform: uppercase; opacity: 0.7; font-weight: bold; margin-top: 5px; display: block;}
        
        .hex-section { padding: 20px 5px; border-top: 2px solid #bbb; display: flex; flex-direction: column; align-items: center; min-height: 150px; }
        .hex-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin-left: 20px; }
        .hex-icon { font-size: 80px; color: #000; line-height: 1; }
        .data-column { display: flex; flex-direction: column; justify-content: space-around; height: 80px; width: 35px; font-weight: bold; font-size: 16px; }
        .hex-info { margin-top: 10px; font-size: 13px; font-weight: bold; color: #333; text-align: center; }
        
        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); }
        .metal { color: var(--metal); } .water { color: var(--water); }
    </style>
</head>
<body>

<div class="container">
    <div class="inputs-row">
        <button class="btn-tool" onclick="setNow()">NOW</button>
        <button class="btn-tool" onclick="getGPS()">GPS</button>
        <input type="date" id="date">
        <input type="time" id="time">
        <button class="btn-calc" onclick="calculateBazi()">CALCULATE</button>
    </div>

    <div class="geo-row">
        <div>
            <label>UTC:</label>
            <input type="number" id="utc-offset" value="1" step="1" style="width: 50px;">
        </div>
        <div>
            <label>LONG:</label>
            <input type="number" id="longitude" value="12.49" step="0.01" style="width: 80px;" placeholder="Longitude">
        </div>
        <div id="solar-time-display" style="font-size: 12px; color: #d40000; font-weight: bold;"></div>
    </div>

    <div class="chart">
        <div class="pillar" id="p-hour"><div class="header">HOUR</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-day"><div class="header">DAY</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-month"><div class="header">MONTH</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-year"><div class="header">YEAR</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
    </div>
</div>

<script>
const ELEMENTS_EN = { '甲': 'wood', '乙': 'wood', '丙': 'fire', '丁': 'fire', '戊': 'earth', '己': 'earth', '庚': 'metal', '辛': 'metal', '壬': 'water', '癸': 'water', '子': 'water', '丑': 'earth', '寅': 'wood', '卯': 'wood', '辰': 'earth', '巳': 'fire', '午': 'fire', '未': 'earth', '申': 'metal', '酉': 'metal', '戌': 'earth', '亥': 'water' };

function setNow() {
    const now = new Date();
    document.getElementById('date').value = now.toISOString().split('T')[0];
    document.getElementById('time').value = now.toTimeString().slice(0,5);
    calculateBazi();
}

function getGPS() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
            document.getElementById('longitude').value = pos.coords.longitude.toFixed(2);
            calculateBazi();
        });
    }
}

function calculateBazi() {
    const dVal = document.getElementById('date').value;
    const tVal = document.getElementById('time').value || "00:00";
    const lon = parseFloat(document.getElementById('longitude').value);
    const utc = parseFloat(document.getElementById('utc-offset').value);
    
    if (!dVal) return;

    // --- LOGICA ORA SOLARE VERA ---
    // 1. Calcola la differenza tra longitudine locale e il meridiano dell'offset UTC inserito
    // Ogni grado = 4 minuti. Il meridiano centrale UTC è (utc * 15)
    const standardMeridian = utc * 15;
    const offsetMinutes = (lon - standardMeridian) * 4;
    
    let baseDate = new Date(`${dVal}T${tVal}`);
    let solarDate = new Date(baseDate.getTime() + offsetMinutes * 60000);
    
    // Display ora solare calcolata
    document.getElementById('solar-time-display').textContent = "True Solar: " + solarDate.toTimeString().slice(0,5);

    const solar = Solar.fromDate(solarDate);
    const lunar = solar.getLunar();
    const eightChar = lunar.getEightChar();

    updatePillar('p-year', eightChar.getYearGan(), eightChar.getYearZhi(), '䷛', '28 Da Guo', '4', '3', eightChar.getYearGan()+eightChar.getYearZhi());
    updatePillar('p-month', eightChar.getMonthGan(), eightChar.getMonthZhi(), '䷙', '26 Da Chu', '6', '4', eightChar.getMonthGan()+eightChar.getMonthZhi());
    updatePillar('p-day', eightChar.getDayGan(), eightChar.getDayZhi(), '䷅', '06 Song', '9', '3', eightChar.getDayGan()+eightChar.getDayZhi());
    updatePillar('p-hour', eightChar.getTimeGan(), eightChar.getTimeZhi(), '䷯', '48 Jing', '7', '6', eightChar.getTimeGan()+eightChar.getTimeZhi());
}

function updatePillar(id, stem, branch, hexIcon, hexName, n1, n2, sideZh) {
    const elS = ELEMENTS_EN[stem];
    const elB = ELEMENTS_EN[branch];
    const p = document.getElementById(id);
    p.querySelector('.stem').innerHTML = `<span class="hanzi ${elS}">${stem}</span><span class="element-label">- ${elS} -</span>`;
    p.querySelector('.branch').innerHTML = `<span class="hanzi ${elB}">${branch}</span><span class="element-label">- ${elB} -</span>`;
    p.querySelector('.hex-section').innerHTML = `<div class="hex-wrapper"><div class="hex-icon">${hexIcon}</div><div class="data-column"><div>${n1}</div><div style="font-size:12px;">${sideZh}</div><div>${n2}</div></div></div><div class="hex-info">${hexName}</div>`;
}

window.onload = setNow;
</script>
</body>
</html>
