<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XKDG Bazi Calculator - STABLE v1</title>
    <style>
        body { font-family: Arial; padding: 20px; }
       .inputs { margin: 20px 0; }
        input, button { margin: 5px; padding: 8px; }
       .chart { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 600px; }
       .pillar { border: 1px solid #ccc; padding: 10px; text-align: center; }
       .stem { font-size: 24px; font-weight: bold; }
       .branch { font-size: 20px; }
    </style>
</head>
<body>
    <h1>XKDG Bazi Calculator - Stable v1</h1>
    <div class="inputs">
        <input type="date" id="date">
        <input type="time" id="time">
        <input type="number" id="longitude" step="0.01" placeholder="Longitude">
        <button onclick="getLocation()">GPS</button>
        <button onclick="setNow()">NOW</button>
        <button onclick="calculate()">Calculate</button>
        <div id="solar-time" style="margin-top:10px; font-size:14px; color:#666;"></div>
    </div>

    <div class="chart">
        <div class="pillar"><div>Hour</div><div class="stem" id="h-stem">-</div><div class="branch" id="h-branch">-</div></div>
        <div class="pillar"><div>Day</div><div class="stem" id="d-stem">-</div><div class="branch" id="d-branch">-</div></div>
        <div class="pillar"><div>Month</div><div class="stem" id="m-stem">-</div><div class="branch" id="m-branch">-</div></div>
        <div class="pillar"><div>Year</div><div class="stem" id="y-stem">-</div><div class="branch" id="y-branch">-</div></div>
    </div>

<script>
// XKDG Bazi - Local Solar Time + GPS Auto - EN Output - STABLE 2026-04-25
const STEMS = ['Jia','Yi','Bing','Ding','Wu','Ji','Geng','Xin','Ren','Gui'];
const BRANCHES = ['Zi','Chou','Yin','Mao','Chen','Si','Wu','Wei','Shen','You','Xu','Hai'];

function getLocation() {
    if (navigator.geolocation) {
        document.getElementById('solar-time').innerText = 'Getting GPS location...';
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lon = position.coords.longitude.toFixed(2);
                document.getElementById('longitude').value = lon;
                document.getElementById('solar-time').innerText = `GPS: Lon ${lon}° detected`;
                calc();
            },
            (error) => {
                document.getElementById('solar-time').innerText = 'GPS denied. Enter longitude manually';
            }
        );
    } else {
        alert('Geolocation not supported by browser');
    }
}

function getSolarTime(hour, minute, longitude, timezoneOffset) {
    const standardMeridian = timezoneOffset * 15;
    const longitudeDiff = longitude - standardMeridian;
    const timeDiffMinutes = longitudeDiff * 4;
    let totalMinutes = hour * 60 + minute + timeDiffMinutes;
    let dayOffset = 0;
    if (totalMinutes < 0) {
        totalMinutes += 1440;
        dayOffset = -1;
    } else if (totalMinutes >= 1440) {
        totalMinutes -= 1440;
        dayOffset = 1;
    }
    const solarHour = Math.floor(totalMinutes / 60);
    const solarMinute = Math.floor(totalMinutes % 60);
    return { hour: solarHour, minute: solarMinute, dayOffset: dayOffset };
}

function getDayGanzhi(date) {
    const refDate = new Date(2026, 3, 23);
    const refIndex = 3;
    const diffDays = Math.round((date - refDate) / 86400000);
    const stemIndex = (refIndex + diffDays) % 10;
    const branchIndex = (refIndex + diffDays) % 12;
    return {
        stem: STEMS[stemIndex < 0? stemIndex + 10 : stemIndex],
        branch: BRANCHES[branchIndex < 0? branchIndex + 12 : branchIndex]
    };
}

function getYearGanzhi(date) {
    const year = date.getFullYear();
    const stemIndex = (year - 4) % 10;
    const branchIndex = (year - 4) % 12;
    return {
        stem: STEMS[stemIndex < 0? stemIndex + 10 : stemIndex],
        branch: BRANCHES[branchIndex < 0? branchIndex + 12 : branchIndex]
    };
}

function getMonthGanzhi(date, yearStem) {
    const month = date.getMonth();
    const yearStemIndex = STEMS.indexOf(yearStem);
    const stemStart = [2, 4, 6, 8, 0][yearStemIndex % 5];
    const stemIndex = (stemStart + month) % 10;
    const branchIndex = (month + 2) % 12;
    return { stem: STEMS[stemIndex], branch: BRANCHES[branchIndex] };
}

function getHourGanzhi(hour, dayStem) {
    const branchIndex = Math.floor((hour + 1) / 2) % 12;
    const dayStemIndex = STEMS.indexOf(dayStem);
    const stemStart = [0, 2, 4, 6, 8][dayStemIndex % 5];
    const stemIndex = (stemStart + branchIndex) % 10;
    return { stem: STEMS[stemIndex], branch: BRANCHES[branchIndex] };
}

function calc() {
    const dateInput = document.getElementById('date').value;
    const timeInput = document.getElementById('time').value;
    const longitude = parseFloat(document.getElementById('longitude').value);
    if (!dateInput ||!timeInput || isNaN(longitude)) {
        alert('Please enter date, time and longitude');
        return;
    }
    const [year, month, day] = dateInput.split('-').map(Number);
    const [hour, minute] = timeInput.split(':').map(Number);
    const timezoneOffset = -new Date(year, month - 1, day).getTimezoneOffset() / 60;
    const solar = getSolarTime(hour, minute, longitude, timezoneOffset);
    const baziDate = new Date(year, month - 1, day + solar.dayOffset);
    const yearGZ = getYearGanzhi(baziDate);
    const monthGZ = getMonthGanzhi(baziDate, yearGZ.stem);
    const dayGZ = getDayGanzhi(baziDate);
    const hourGZ = getHourGanzhi(solar.hour, dayGZ.stem);
    document.getElementById('h-stem').innerText = hourGZ.stem;
    document.getElementById('h-branch').innerText = hourGZ.branch;
    document.getElementById('d-stem').innerText = dayGZ.stem;
    document.getElementById('d-branch').innerText = dayGZ.branch;
    document.getElementById('m-stem').innerText = monthGZ.stem;
    document.getElementById('m-branch').innerText = monthGZ.branch;
    document.getElementById('y-stem').innerText = yearGZ.stem;
    document.getElementById('y-branch').innerText = yearGZ.branch;
    document.getElementById('solar-time').innerText =
        `Solar Time: ${String(solar.hour).padStart(2,'0')}:${String(solar.minute).padStart(2,'0')}
         | Lon: ${longitude}° | Correction: ${((longitude - timezoneOffset*15)*4).toFixed(1)} min`;
}

function setNow() {
    const now = new Date();
    document.getElementById('date').value = now.toISOString().split('T')[0];
    document.getElementById('time').value = now.toTimeString().slice(0,5);
}

function calculate() {
    calc();
}

window.onload = function() {
    setNow();
    getLocation();
};
</script>
</body>
</html>
