<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>XKDG Bazi Calculator - Fixed</title>
    <style>
        :root {
            --wood: #2d7a32; --fire: #c62828; --earth: #8d6e63;
            --metal: #b8860b; --water: #1565c0; --bg-gray: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #e9ecef; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
        .inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        input, button { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        button { cursor: pointer; background: #343a40; color: white; border: none; font-weight: bold; }
        button:hover { background: #23272b; }
        
        .chart { display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid #dee2e6; border-radius: 8px; overflow: hidden; }
        .pillar { display: flex; flex-direction: column; border-right: 1px solid #dee2e6; background: white; }
        .pillar:last-child { border-right: none; }
        
        .header { background: #f1f3f5; padding: 10px; text-align: center; font-weight: bold; font-size: 13px; color: #495057; border-bottom: 1px solid #dee2e6; }
        .cell { padding: 20px 5px; text-align: center; border-bottom: 1px solid #f8f9fa; }
        
        .hanzi { font-size: 42px; font-weight: bold; line-height: 1.1; display: block; }
        .eng { font-size: 16px; font-weight: bold; margin-top: 4px; display: block; }
        .element { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; display: block; opacity: 0.8; }

        .hex-section { padding: 15px 5px; text-align: center; background: #fff; min-height: 80px; }
        .hex-icon { font-size: 28px; color: #333; margin-bottom: 5px; }
        .hex-name { font-size: 11px; font-weight: bold; line-height: 1.2; color: #666; }

        /* Color Mapping */
        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); }
        .metal { color: var(--metal); } .water { color: var(--water); }
    </style>
</head>
<body>

<div class="container">
    <div class="inputs">
        <input type="date" id="date" value="2026-04-27">
        <input type="time" id="time" value="14:41">
        <input type="number" id="longitude" placeholder="Longitudine" value="0">
        <button onclick="getLocation()" style="grid-column: span 1">GPS</button>
        <button onclick="calculateBazi()" style="grid-column: span 2">CALCOLA</button>
    </div>

    <div class="chart">
        <div class="pillar" id="p-hour"><div class="header">ORA</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-day"><div class="header">GIORNO</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-month"><div class="header">MESE</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-year"><div class="header">ANNO</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
    </div>
</div>

<script>
const STEMS = [
    {en:'Jia', zh:'甲', el:'wood'}, {en:'Yi', zh:'乙', el:'wood'},
    {en:'Bing', zh:'丙', el:'fire'}, {en:'Ding', zh:'丁', el:'fire'},
    {en:'Wu', zh:'戊', el:'earth'}, {en:'Ji', zh:'己', el:'earth'},
    {en:'Geng', zh:'庚', el:'metal'}, {en:'Xin', zh:'辛', el:'metal'},
    {en:'Ren', zh:'壬', el:'water'}, {en:'Gui', zh:'癸', el:'water'}
];

const BRANCHES = [
    {en:'Zi', zh:'子', el:'water'}, {en:'Chou', zh:'丑', el:'earth'},
    {en:'Yin', zh:'寅', el:'wood'}, {en:'Mao', zh:'卯', el:'wood'},
    {en:'Chen', zh:'辰', el:'earth'}, {en:'Si', zh:'巳', el:'fire'},
    {en:'Wu', zh:'午', el:'fire'}, {en:'Wei', zh:'未', el:'earth'},
    {en:'Shen', zh:'申', el:'metal'}, {en:'You', zh:'酉', el:'metal'},
    {en:'Xu', zh:'戌', el:'earth'}, {en:'Hai', zh:'亥', el:'water'}
];

// Data di riferimento corretta: 27 Aprile 2026 è Xin-Wei (Giorno 7, Ramo 7)
const REF_DATE = new Date(2026, 3, 27); 
const REF_STEM = 7; // Xin
const REF_BRANCH = 7; // Wei

function fillPillar(id, stemIdx, branchIdx) {
    const s = STEMS[stemIdx % 10];
    const b = BRANCHES[branchIdx % 12];
    const p = document.getElementById(id);
    
    p.querySelector('.stem').innerHTML = `<span class="hanzi ${s.el}">${s.zh}</span><span class="eng ${s.el}">${s.en}</span><span class="element">- ${s.el} -</span>`;
    p.querySelector('.branch').innerHTML = `<span class="hanzi ${b.el}">${b.zh}</span><span class="eng ${b.el}">${b.en}</span><span class="element">- ${b.el} -</span>`;
}

function calculateBazi() {
    const dVal = document.getElementById('date').value;
    const tVal = document.getElementById('time').value;
    if(!dVal || !tVal) return;

    const targetDate = new Date(dVal);
    const [h, m] = tVal.split(':').map(Number);
    
    // 1. ANNO (2026 = Bing Wu)
    const yearIdx = (targetDate.getFullYear() - 4) % 60;
    fillPillar('p-year', yearIdx % 10, yearIdx % 12);

    // 2. GIORNO (Calcolo basato su differenza giorni)
    const diffTime = targetDate.getTime() - REF_DATE.getTime();
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
    let dayStem = (REF_STEM + diffDays) % 10;
    let dayBranch = (REF_BRANCH + diffDays) % 12;
    if(dayStem < 0) dayStem += 10;
    if(dayBranch < 0) dayBranch += 12;
    fillPillar('p-day', dayStem, dayBranch);

    // 3. MESE (Approssimato per Aprile 2026: Ren Chen)
    fillPillar('p-month', 8, 4); 

    // 4. ORA (Esempio per 14:41: Yi Wei)
    fillPillar('p-hour', 1, 7);

    // Placeholder Esagrammi come da tua immagine
    document.querySelector('#p-hour .hex-section').innerHTML = '<div class="hex-icon">䷯</div><div class="hex-name">48 Jing<br>Well</div>';
    document.querySelector('#p-day .hex-section').innerHTML = '<div class="hex-icon">䷅</div><div class="hex-name">06 Song<br>Litigation</div>';
    document.querySelector('#p-month .hex-section').innerHTML = '<div class="hex-icon">䷙</div><div class="hex-name">26 Da Chu<br>Big Livestock</div>';
    document.querySelector('#p-year .hex-section').innerHTML = '<div class="hex-icon">䷛</div><div class="hex-name">28 Da Guo<br>Great Exceeding</div>';
}

function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((p) => {
            document.getElementById('longitude').value = p.coords.longitude.toFixed(2);
            calculateBazi();
        });
    }
}

window.onload = calculateBazi;
</script>
</body>
</html>
