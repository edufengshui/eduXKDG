<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Bazi Calculator Pro - XKDG Style</title>
    <style>
        :root {
            --wood: #2d7a32;
            --fire: #c62828;
            --earth: #8d6e63;
            --metal: #757575;
            --water: #1565c0;
            --bg-gray: #f5f5f5;
            --border: #e0e0e0;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fafafa; padding: 20px; color: #333; }
        h1 { text-align: center; color: #444; font-weight: 300; }
        
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 30px; border-bottom: 2px solid var(--bg-gray); padding-bottom: 20px; }
        input, button { padding: 10px; border: 1px solid var(--border); border-radius: 4px; outline: none; }
        button { cursor: pointer; background: #444; color: white; transition: 0.3s; }
        button:hover { background: #666; }

        .chart { display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid var(--border); background: #fff; }
        
        .pillar { display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .pillar:last-child { border-right: none; }

        .header { background: var(--bg-gray); padding: 8px; text-align: center; font-weight: bold; border-bottom: 1px solid var(--border); text-transform: uppercase; font-size: 14px; }
        .time-info { font-size: 12px; color: #666; text-align: center; padding: 5px; border-bottom: 1px solid var(--border); background: #fff; }

        .cell { padding: 15px 5px; text-align: center; border-bottom: 1px solid #f0f0f0; min-height: 80px; display: flex; flex-direction: column; justify-content: center; }
        
        .stem-hanzi { font-size: 38px; line-height: 1; margin-bottom: 2px; }
        .branch-hanzi { font-size: 32px; line-height: 1; margin-bottom: 2px; }
        .eng-label { font-size: 14px; font-weight: bold; }
        .element-label { font-size: 11px; text-transform: uppercase; opacity: 0.8; }

        /* Colori Elementi */
        .wood { color: var(--wood); }
        .fire { color: var(--fire); }
        .earth { color: var(--earth); }
        .metal { color: var(--metal); }
        .water { color: var(--water); }

        .hexagram-area { padding: 15px 5px; text-align: center; background: #fff; }
        .hex-drawing { font-size: 24px; line-height: 1.1; letter-spacing: 2px; margin-bottom: 5px; }
        .hex-name { font-size: 12px; font-weight: bold; line-height: 1.2; }

        #solar-time-display { margin-top: 15px; text-align: center; font-size: 13px; color: #777; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bazi Calculator Pro</h1>
    
    <div class="inputs">
        <input type="date" id="date">
        <input type="time" id="time">
        <input type="number" id="longitude" step="0.01" placeholder="Longitudine">
        <button onclick="getLocation()">GPS</button>
        <button onclick="calc()">CALCOLA</button>
    </div>

    <div class="chart">
        <div class="pillar">
            <div class="header">Ora</div>
            <div class="time-info" id="h-time-val">-</div>
            <div class="cell" id="h-stem-box">
                <div class="stem-hanzi" id="h-stem-zh">-</div>
                <div class="eng-label" id="h-stem-en">-</div>
                <div class="element-label" id="h-stem-el">-</div>
            </div>
            <div class="cell" id="h-branch-box">
                <div class="branch-hanzi" id="h-branch-zh">-</div>
                <div class="eng-label" id="h-branch-en">-</div>
                <div class="element-label" id="h-branch-el">-</div>
            </div>
            <div class="hexagram-area">
                <div class="hex-drawing">䷯</div>
                <div class="hex-name">48 Jing<br>Well</div>
            </div>
        </div>

        <div class="pillar">
            <div class="header">Giorno</div>
            <div class="time-info" id="d-time-val">-</div>
            <div class="cell" id="d-stem-box">
                <div class="stem-hanzi" id="d-stem-zh">-</div>
                <div class="eng-label" id="d-stem-en">-</div>
                <div class="element-label" id="d-stem-el">-</div>
            </div>
            <div class="cell" id="d-branch-box">
                <div class="branch-hanzi" id="d-branch-zh">-</div>
                <div class="eng-label" id="d-branch-en">-</div>
                <div class="element-label" id="d-branch-el">-</div>
            </div>
            <div class="hexagram-area">
                <div class="hex-drawing">䷅</div>
                <div class="hex-name">06 Song<br>Litigation</div>
            </div>
        </div>

        <div class="pillar">
            <div class="header">Mese</div>
            <div class="time-info" id="m-time-val">-</div>
            <div class="cell" id="m-stem-box">
                <div class="stem-hanzi" id="m-stem-zh">-</div>
                <div class="eng-label" id="m-stem-en">-</div>
                <div class="element-label" id="m-stem-el">-</div>
            </div>
            <div class="cell" id="m-branch-box">
                <div class="branch-hanzi" id="m-branch-zh">-</div>
                <div class="eng-label" id="m-branch-en">-</div>
                <div class="element-label" id="m-branch-el">-</div>
            </div>
            <div class="hexagram-area">
                <div class="hex-drawing">䷙</div>
                <div class="hex-name">26 Da Chu<br>Big Livestock</div>
            </div>
        </div>

        <div class="pillar">
            <div class="header">Anno</div>
            <div class="time-info" id="y-time-val">-</div>
            <div class="cell" id="y-stem-box">
                <div class="stem-hanzi" id="y-stem-zh">-</div>
                <div class="eng-label" id="y-stem-en">-</div>
                <div class="element-label" id="y-stem-el">-</div>
            </div>
            <div class="cell" id="y-branch-box">
                <div class="branch-hanzi" id="y-branch-zh">-</div>
                <div class="eng-label" id="y-branch-en">-</div>
                <div class="element-label" id="y-branch-el">-</div>
            </div>
            <div class="hexagram-area">
                <div class="hex-drawing">䷛</div>
                <div class="hex-name">28 Da Guo<br>Great Exceeding</div>
            </div>
        </div>
    </div>

    <div id="solar-time-display"></div>
</div>

<script>
const STEMS = [
    {en:'Jia', zh:'甲', el:'wood'}, {en:'Yi', zh:'乙', el:'wood'},
    {en:'Bing', zh:'丙', el:'fire'}, {en:'Ding', zh:'丁', el:'fire'},
    {en:'Wu', zh:'戊', el:'earth'}, {en:'Ji', zh:'己', el:'earth'},
    {en:'Geng', zh:'庚', el:'metal'}, {en:'Xin', zh:'辛', el:'metal'},
    {en:'Ren', zh:'壬', el:'water'}, {en:'Gui', zh:'癸', el:'water'}
];

const BRANCHES = [
    {en:'Zi', zh:'子', el:'water'}, {en:'Chou', zh:'丑', el:'earth'},
    {en:'Yin', zh:'寅', el:'wood'}, {en:'Mao', zh:'卯', el:'wood'},
    {en:'Chen', zh:'辰', el:'earth'}, {en:'Si', zh:'巳', el:'fire'},
    {en:'Wu', zh:'午', el:'fire'}, {en:'Wei', zh:'未', el:'earth'},
    {en:'Shen', zh:'申', el:'metal'}, {en:'You', zh:'酉', el:'metal'},
    {en:'Xu', zh:'戌', el:'earth'}, {en:'Hai', zh:'亥', el:'water'}
];

function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((p) => {
            document.getElementById('longitude').value = p.coords.longitude.toFixed(2);
            calc();
        });
    }
}

function updateUI(pillar, dataStem, dataBranch) {
    const stemEl = document.getElementById(`${pillar}-stem-zh`);
    const stemEn = document.getElementById(`${pillar}-stem-en`);
    const stemLabel = document.getElementById(`${pillar}-stem-el`);
    
    const branchEl = document.getElementById(`${pillar}-branch-zh`);
    const branchEn = document.getElementById(`${pillar}-branch-en`);
    const branchLabel = document.getElementById(`${pillar}-branch-el`);

    // Reset classi
    [stemEl, stemEn, branchEl, branchEn].forEach(e => {
        e.className = e.className.split(' ')[0]; 
        e.classList.add(dataStem.el);
    });

    stemEl.innerText = dataStem.zh;
    stemEn.innerText = dataStem.en;
    stemLabel.innerText = `- ${dataStem.el} -`;

    branchEl.innerText = dataBranch.zh;
    branchEn.innerText = dataBranch.en;
    branchLabel.innerText = `- ${dataBranch.el} -`;
    
    // Aggiungi colore specifico al ramo
    branchEl.classList.remove(dataStem.el);
    branchEl.classList.add(dataBranch.el);
    branchEn.classList.remove(dataStem.el);
    branchEn.classList.add(dataBranch.el);
}

// Funzioni logica Bazi (dal tuo codice originale)
function getYearGanzhi(date) {
    const year = date.getFullYear();
    const idx = (year - 4) % 60;
    return { stem: STEMS[idx % 10], branch: BRANCHES[idx % 12] };
}

function getDayGanzhi(date) {
    const refDate = new Date(2026, 3, 23); // 23 Aprile 2026 è Giorno Xin-Si (da tuo screen)
    const diffDays = Math.round((date - refDate) / 86400000);
    let sIdx = (7 + diffDays) % 10; // Xin è indice 7
    let bIdx = (5 + diffDays) % 12; // Si è indice 5
    return { 
        stem: STEMS[sIdx < 0 ? sIdx + 10 : sIdx], 
        branch: BRANCHES[bIdx < 0 ? bIdx + 12 : bIdx] 
    };
}

function calc() {
    const dVal = document.getElementById('date').value;
    const tVal = document.getElementById('time').value;
    const lon = parseFloat(document.getElementById('longitude').value) || 0;
    
    if(!dVal || !tVal) return;

    const date = new Date(dVal + 'T' + tVal);
    const yGZ = getYearGanzhi(date);
    const dGZ = getDayGanzhi(date);
    
    // Esempio popolamento UI
    updateUI('y', yGZ.stem, yGZ.branch);
    updateUI('d', dGZ.stem, dGZ.branch);
    
    // Placeholder per Mese e Ora (usa tua logica esistente)
    // updateUI('m', monthStem, monthBranch);
    // updateUI('h', hourStem, hourBranch);

    document.getElementById('solar-time-display').innerText = `Calcolato per Longitudine: ${lon}°`;
}

window.onload = () => {
    const now = new Date();
    document.getElementById('date').value = now.toISOString().split('T')[0];
    document.getElementById('time').value = now.toTimeString().slice(0,5);
};
</script>
</body>
</html>
