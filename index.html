<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XKDG Bazi Calculator Pro - Graphic Style</title>
    <style>
        :root {
            --wood: #2d7a32; --fire: #c62828; --earth: #8d6e63;
            --metal: #555; --water: #1565c0;
        }
        body { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; background: #e9ecef; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 850px; }
        
        .inputs-row { display: flex; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; align-items: center; }
        .inputs-row input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; min-width: 120px; font-size: 14px; }
        .inputs-row button { padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; background: #555; color: white; font-size: 13px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        .btn-now { background: #888 !important; }

        .chart { display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; background: #fff; }
        .pillar { display: flex; flex-direction: column; border-right: 1px solid #eee; }
        .pillar:last-child { border-right: none; }
        
        .header { background: #f8f9fa; padding: 12px; text-align: center; font-weight: bold; font-size: 12px; color: #666; border-bottom: 1px solid #eee; letter-spacing: 1px; }
        .cell { padding: 12px 5px; text-align: center; border-bottom: 1px solid #fafafa; }
        
        /* Carattere Cinese: Raffinato, Grafico e Sans-Serif */
        .hanzi { 
            font-size: 48px; 
            display: block; 
            font-weight: 300; /* Più sottile */
            line-height: 1.1;
            /* Font grafici moderni */
            font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif; 
        }
        .eng { font-size: 16px; font-weight: 600; margin-top: 4px; display: block; }
        .element-label { font-size: 11px; text-transform: uppercase; opacity: 0.6; font-weight: bold; letter-spacing: 0.5px; }

        /* Hexagram Section */
        .hex-section { padding: 20px 5px; text-align: center; background: #fff; }
        .hex-wrapper { display: inline-flex; align-items: center; gap: 8px; }
        .hex-icon { font-size: 72px; color: #222; line-height: 1; }

        /* Data Column compact */
        .data-column { 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            align-items: center;
            height: 72px; 
            color: #000;
        }
        .num-xkdg { font-size: 18px; font-weight: bold; line-height: 1; }
        .side-pillar-small { 
            font-size: 14px; 
            line-height: 1.1; 
            color: #333; 
            font-weight: 500;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .hex-info { margin-top: 12px; font-size: 12px; font-weight: bold; color: #444; line-height: 1.3; }

        /* Colori */
        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); }
        .metal { color: var(--metal); } .water { color: var(--water); }
    </style>
</head>
<body>

<div class="container">
    <div class="inputs-row">
        <input type="date" id="date">
        <input type="time" id="time">
        <input type="number" id="longitude" placeholder="Longitude" step="0.01">
        <button class="btn-now" onclick="setNow()">NOW</button>
        <button onclick="calculateBazi()">CALCULATE</button>
    </div>

    <div class="chart">
        <div class="pillar" id="p-hour"><div class="header">HOUR</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-day"><div class="header">DAY</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-month"><div class="header">MONTH</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-year"><div class="header">YEAR</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
    </div>
</div>

<script>
// (Logica STEMS, BRANCHES e REF_DATE rimane invariata per precisione calcolo)
const STEMS = [
    {en:'Jia', zh:'甲', el:'wood'}, {en:'Yi', zh:'乙', el:'wood'},
    {en:'Bing', zh:'丙', el:'fire'}, {en:'Ding', zh:'丁', el:'fire'},
    {en:'Wu', zh:'戊', el:'earth'}, {en:'Ji', zh:'己', el:'earth'},
    {en:'Geng', zh:'庚', el:'metal'}, {en:'Xin', zh:'辛', el:'metal'},
    {en:'Ren', zh:'壬', el:'water'}, {en:'Gui', zh:'癸', el:'water'}
];
const BRANCHES = [
    {en:'Zi', zh:'子', el:'water'}, {en:'Chou', zh:'丑', el:'earth'},
    {en:'Yin', zh:'寅', el:'wood'}, {en:'Mao', zh:'卯', el:'wood'},
    {en:'Chen', zh:'辰', el:'earth'}, {en:'Si', zh:'巳', el:'fire'},
    {en:'Wu', zh:'午', el:'fire'}, {en:'Wei', zh:'未', el:'earth'},
    {en:'Shen', zh:'申', el:'metal'}, {en:'You', zh:'酉', el:'metal'},
    {en:'Xu', zh:'戌', el:'earth'}, {en:'Hai', zh:'亥', el:'water'}
];

const REF_DATE = new Date(2026, 3, 27); 
const REF_STEM = 7; 
const REF_BRANCH = 7; 

function setNow() {
    const now = new Date();
    document.getElementById('date').value = now.toISOString().split('T')[0];
    document.getElementById('time').value = now.toTimeString().slice(0,5);
    calculateBazi();
}

function fillPillar(id, stemIdx, branchIdx) {
    const s = STEMS[stemIdx % 10];
    const b = BRANCHES[branchIdx % 12];
    const p = document.getElementById(id);
    p.querySelector('.stem').innerHTML = `<span class="hanzi ${s.el}">${s.zh}</span><span class="eng ${s.el}">${s.en}</span><span class="element-label">- ${s.el} -</span>`;
    p.querySelector('.branch').innerHTML = `<span class="hanzi ${b.el}">${b.zh}</span><span class="eng ${b.el}">${b.en}</span><span class="element-label">- ${b.el} -</span>`;
}

function setHex(id, icon, name, numEl, numPer, sideZh) {
    const section = document.querySelector(`#${id} .hex-section`);
    section.innerHTML = `
        <div class="hex-wrapper">
            <div class="hex-icon">${icon}</div>
            <div class="data-column">
                <div class="num-xkdg">${numEl}</div>
                <div class="side-pillar-small">${sideZh}</div>
                <div class="num-xkdg">${numPer}</div>
            </div>
        </div>
        <div class="hex-info">${name}</div>
    `;
}

function calculateBazi() {
    const dVal = document.getElementById('date').value;
    const tVal = document.getElementById('time').value;
    if(!dVal || !tVal) return;
    const targetDate = new Date(dVal);
    
    const yearIdx = (targetDate.getFullYear() - 4) % 60;
    fillPillar('p-year', yearIdx % 10, yearIdx % 12);
    const diffDays = Math.floor((targetDate.getTime() - REF_DATE.getTime()) / (1000 * 60 * 60 * 24));
    let dS = (REF_STEM + diffDays) % 10; let dB = (REF_BRANCH + diffDays) % 12;
    fillPillar('p-day', dS < 0 ? dS + 10 : dS, dB < 0 ? dB + 12 : dB);
    
    // Static Month/Hour placeholders from your example
    fillPillar('p-month', 8, 4); 
    fillPillar('p-hour', 1, 7);  

    setHex('p-hour', '䷯', '48 Jing<br>Well', '7', '6', '乙<br>未');
    setHex('p-day', '䷅', '06 Song<br>Litigation', '9', '3', '辛<br>未');
    setHex('p-month', '䷙', '26 Da Chu<br>Big Livestock', '6', '4', '壬<br>辰');
    setHex('p-year', '䷛', '28 Da Guo<br>Great Exceeding', '4', '3', '丙<br>午');
}

window.onload = setNow;
</script>
</body>
</html>
