<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XKDG Bazi Calculator Pro - Advanced Layout</title>
    <style>
        :root {
            --wood: #2d7a32; --fire: #c62828; --earth: #8d6e63;
            --metal: #b8860b; --water: #1565c0; --bg-gray: #f8f9fa;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #e9ecef; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 850px; }
        
        .inputs-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .inputs-row input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; min-width: 120px; }
        .inputs-row button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; background: #444; color: white; font-size: 13px; transition: 0.2s; text-transform: uppercase; font-weight: bold; }
        
        .chart { display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid #dee2e6; border-radius: 8px; overflow: hidden; }
        .pillar { display: flex; flex-direction: column; border-right: 1px solid #dee2e6; background: white; }
        .pillar:last-child { border-right: none; }
        
        .header { background: #f1f3f5; padding: 10px; text-align: center; font-weight: bold; font-size: 12px; color: #495057; border-bottom: 1px solid #dee2e6; }
        .cell { padding: 15px 5px; text-align: center; border-bottom: 1px solid #f8f9fa; }
        
        .hanzi { font-size: 32px; font-weight: normal; line-height: 1.2; display: block; font-family: "STKaiti", "Kaiti SC", serif; }
        .eng { font-size: 15px; font-weight: bold; margin-top: 2px; display: block; }
        .element-label { font-size: 10px; text-transform: uppercase; opacity: 0.7; }

        /* Hexagram Section with Precise Offsets */
        .hex-section { padding: 25px 10px; text-align: center; background: #fff; }
        .hex-container { display: inline-block; position: relative; padding-right: 35px; }
        
        /* The Hexagram Symbol */
        .hex-icon { font-size: 72px; color: #333; line-height: 1; display: block; }

        /* XKDG Numbers - Re-positioned */
        .xkdg-num { position: absolute; font-size: 18px; font-weight: bold; color: #000; right: 0; }
        .num-top { top: -10px; }    /* Moved higher up */
        .num-bottom { bottom: -5px; } 

        /* Side Stem-Branch Pillar */
        .side-pillar { 
            position: absolute; 
            right: 5px; 
            top: 50%; 
            transform: translateY(-50%); 
            font-size: 14px; 
            font-weight: bold; 
            line-height: 1.1; 
            color: #333;
            text-align: center;
        }

        .hex-info { margin-top: 10px; font-size: 11px; font-weight: bold; color: #555; }

        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); }
        .metal { color: var(--metal); } .water { color: var(--water); }
    </style>
</head>
<body>

<div class="container">
    <div class="inputs-row">
        <input type="date" id="date">
        <input type="time" id="time">
        <input type="number" id="longitude" placeholder="Lon" step="0.01">
        <button onclick="setNow()">NOW</button>
        <button onclick="calculateBazi()">CALCULATE</button>
    </div>

    <div class="chart">
        <div class="pillar" id="p-hour"><div class="header">HOUR</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-day"><div class="header">DAY</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-month"><div class="header">MONTH</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-year"><div class="header">YEAR</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
    </div>
</div>

<script>

    {en:'Bing', zh:'丙', el:'fire'}, {en:'Ding', zh:'丁', el:'fire'},
    {en:'Wu', zh:'戊', el:'earth'}, {en:'Ji', zh:'己', el:'earth'},
    {en:'Geng', zh:'庚', el:'metal'}, {en:'Xin', zh:'辛', el:'metal'},
    {en:'Ren', zh:'壬', el:'water'}, {en:'Gui', zh:'癸', el:'water'}
];

const BRANCHES = [
    {en:'Zi', zh:'子', el:'water'}, {en:'Chou', zh:'丑', el:'earth'},
    {en:'Yin', zh:'寅', el:'wood'}, {en:'Mao', zh:'卯', el:'wood'},
    {en:'Chen', zh:'辰', el:'earth'}, {en:'Si', zh:'巳', el:'fire'},
    {en:'Wu', zh:'午', el:'fire'}, {en:'Wei', zh:'未', el:'earth'},
    {en:'Shen', zh:'申', el:'metal'}, {en:'You', zh:'酉', el:'metal'},
    {en:'Xu', zh:'戌', el:'earth'}, {en:'Hai', zh:'亥', el:'water'}
];

const REF_DATE = new Date(2026, 3, 27); 
const REF_STEM = 7; 
const REF_BRANCH = 7; 

function setNow() {
    const now = new Date();
    document.getElementById('date').value = now.toISOString().split('T')[0];
    document.getElementById('time').value = now.toTimeString().slice(0,5);
    calculateBazi();
}

function fillPillar(id, stemIdx, branchIdx) {
    const s = STEMS[stemIdx % 10];
    const b = BRANCHES[branchIdx % 12];
    const p = document.getElementById(id);
    p.querySelector('.stem').innerHTML = `<span class="hanzi ${s.el}">${s.zh}</span><span class="eng ${s.el}">${s.en}</span><span class="element-label">- ${s.el} -</span>`;
    p.querySelector('.branch').innerHTML = `<span class="hanzi ${b.el}">${b.zh}</span><span class="eng ${b.el}">${b.en}</span><span class="element-label">- ${b.el} -</span>`;
}

function setHex(id, icon, name, numEl, numPer, sideZh) {
    const section = document.querySelector(`#${id} .hex-section`);
    section.innerHTML = `
        <div class="hex-container">
            <div class="hex-icon">${icon}</div>
            <div class="xkdg-num num-top">${numEl}</div>
            <div class="xkdg-num num-bottom">${numPer}</div>
            <div class="side-pillar">${sideZh}</div>
        </div>
        <div class="hex-info">${name}</div>
    `;
}
