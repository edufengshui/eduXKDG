<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XKDG Bazi Calculator Pro - Enhanced</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');

        :root {
            --wood: #1a8a1a; --fire: #d40000; --earth: #8b5a2b;
            --metal: #555; --water: #0000cd;
            --separator-stroke: 2px;
            --separator-color: #bbb;
            --header-pink: #fce4ec; /* Rosa per l'intestazione */
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 100%; max-width: 900px; }
        
        /* Command Bar */
        .inputs-row { display: flex; gap: 8px; margin-bottom: 30px; align-items: center; justify-content: center; }
        .inputs-row input { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .inputs-row button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; color: white; font-size: 12px; font-weight: bold; text-transform: uppercase; transition: opacity 0.2s; }
        .btn-now { background: #6c757d; }
        .btn-gps { background: #007bff; }
        .btn-calc { background: #2d2d2d; }
        .btn-calc:hover { background: #000; }

        /* Chart Structure */
        .chart { display: grid; grid-template-columns: repeat(4, 1fr); border: var(--separator-stroke) solid var(--separator-color); border-radius: 8px; overflow: hidden; background: #fff; }
        .pillar { display: flex; flex-direction: column; border-right: var(--separator-stroke) solid var(--separator-color); text-align: center; }
        .pillar:last-child { border-right: none; }
        
        /* 1. Riga in alto Rosa */
        .header { 
            background: var(--header-pink); 
            padding: 12px; 
            font-weight: 800; 
            font-size: 13px; 
            color: #880e4f; 
            border-bottom: var(--separator-stroke) solid var(--separator-color); 
            letter-spacing: 1.5px; 
        }
        
        /* Stelo e Ramo */
        .stem { padding-top: 20px; margin-bottom: -8px; } 
        .branch { padding-bottom: 20px; }
        
        .hanzi { 
            font-family: 'Ma Shan Zheng', cursive; 
            font-size: 64px; 
            line-height: 1;
            display: block;
            filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.1));
        }
        .eng-name { font-size: 17px; font-weight: bold; margin-top: 4px; display: block; }
        .element-label { font-size: 11px; text-transform: uppercase; opacity: 0.6; font-weight: bold; margin-bottom: 5px; display: block; }

        /* 2. Box Esagramma Ingrandito */
        .hex-section { 
            padding: 25px 10px; 
            border-top: var(--separator-stroke) solid var(--separator-color); 
            background: #fff;
            min-height: 140px; /* Più spazio verticale */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .hex-wrapper { display: inline-flex; align-items: center; gap: 15px; }
        .hex-icon { font-size: 82px; color: #111; line-height: 1; } /* Esagramma più grande */

        .data-column { 
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            height: 85px; 
        }
        .num-xkdg { font-size: 22px; color: #000; font-weight: 900; } /* Numeri a fianco più grandi */
        .side-pillar-small { font-size: 15px; line-height: 1.1; color: #444; font-family: 'Ma Shan Zheng', cursive; font-weight: bold; }
        
        .hex-info { margin-top: 12px; font-size: 13px; font-weight: bold; color: #333; line-height: 1.2; }

        /* Element Colors */
        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); }
        .metal { color: var(--metal); } .water { color: var(--water); }
    </style>
</head>
<body>

<div class="container">
    <div class="inputs-row">
        <input type="date" id="date">
        <input type="time" id="time">
        <input type="number" id="lon" placeholder="Lon" step="0.01">
        <button class="btn-now" onclick="setNow()">NOW</button>
        <button class="btn-gps" onclick="getLocation()">GPS</button>
        <button class="btn-calc" onclick="calculateBazi()">CALCULATE</button>
    </div>

    <div class="chart">
        <div class="pillar" id="p-hour"><div class="header">HOUR</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-day"><div class="header">DAY</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-month"><div class="header">MONTH</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-year"><div class="header">YEAR</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
    </div>
</div>

<script>
// Logica di base per visualizzazione (Stessi dati dell'esempio precedente)
const STEMS = [
    {en:'Jia', zh:'甲', el:'wood'}, {en:'Yi', zh:'乙', el:'wood'},
    {en:'Bing', zh:'丙', el:'fire'}, {en:'Ding', zh:'丁', el:'fire'},
    {en:'Wu', zh:'戊', el:'earth'}, {en:'Ji', zh:'己', el:'earth'},
    {en:'Geng', zh:'庚', el:'metal'}, {en:'Xin', zh:'辛', el:'metal'},
    {en:'Ren', zh:'壬', el:'water'}, {en:'Gui', zh:'癸', el:'water'}
];

const BRANCHES = [
    {en:'Zi', zh:'子', el:'water'}, {en:'Chou', zh:'丑', el:'earth'},
    {en:'Yin', zh:'寅', el:'wood'}, {en:'Mao', zh:'卯', el:'wood'},
    {en:'Chen', zh:'辰', el:'earth'}, {en:'Si', zh:'巳', el:'fire'},
    {en:'Wu', zh:'午', el:'fire'}, {en:'Wei', zh:'未', el:'earth'},
    {en:'Shen', zh:'申', el:'metal'}, {en:'You', zh:'酉', el:'metal'},
    {en:'Xu', zh:'戌', el:'earth'}, {en:'Hai', zh:'亥', el:'water'}
];

function fillPillar(id, sIdx, bIdx) {
    const s = STEMS[sIdx % 10]; const b = BRANCHES[bIdx % 12];
    const p = document.getElementById(id);
    p.querySelector('.stem').innerHTML = `<span class="hanzi ${s.el}">${s.zh}</span><span class="eng-name">${s.en}</span><span class="element-label">- ${s.el} -</span>`;
    p.querySelector('.branch').innerHTML = `<span class="hanzi ${b.el}">${b.zh}</span><span class="eng-name">${b.en}</span><span class="element-label">- ${b.el} -</span>`;
}

function setHex(id, icon, name, numT, numB, sideZh) {
    const section = document.querySelector(`#${id} .hex-section`);
    section.innerHTML = `
        <div class="hex-wrapper">
            <div class="hex-icon">${icon}</div>
            <div class="data-column">
                <div class="num-xkdg">${numT}</div>
                <div class="side-pillar-small">${sideZh}</div>
                <div class="num-xkdg">${numB}</div>
            </div>
        </div>
        <div class="hex-info">${name}</div>
    `;
}

function calculateBazi() {
    // Esempio statico basato sulla tua immagine del 27/04/2026
    fillPillar('p-year', 2, 6);   // Bing Wu
    fillPillar('p-month', 8, 4);  // Ren Chen
    fillPillar('p-day', 7, 7);    // Xin Wei
    fillPillar('p-hour', 1, 7);   // Yi Wei

    setHex('p-hour', '䷯', '48 Jing<br>Well', '7', '6', '乙<br>未');
    setHex('p-day', '䷅', '06 Song<br>Litigation', '9', '3', '辛<br>未');
    setHex('p-month', '䷙', '26 Da Chu<br>Big Livestock', '6', '4', '壬<br>辰');
    setHex('p-year', '䷛', '28 Da Guo<br>Great Exceeding', '4', '3', '丙<br>午');
}

function setNow() {
    const now = new Date();
    document.getElementById('date').value = now.toISOString().split('T')[0];
    document.getElementById('time').value = now.toTimeString().slice(0,5);
    calculateBazi();
}

window.onload = setNow;
</script>
</body>
</html>
