<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>XKDG Bazi Chart - FIXED</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; background: #f0f0f0; }
        .inputs { margin-bottom: 25px; }
        input { padding: 10px; margin: 5px; font-size: 16px; }
        button { padding: 12px 40px; background: #0078d4; color: white; border: none; font-size: 16px; cursor: pointer; }
        .chart { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 900px; margin: 30px auto; }
        .pillar { background: white; padding: 25px 10px; border: 1px solid #ccc; border-radius: 4px; }
        .pillar .label { font-weight: bold; color: #555; margin-bottom: 15px; font-size: 18px; }
        .pillar .stem { font-size: 36px; font-weight: bold; text-transform: capitalize; line-height: 1.2; }
        .pillar .branch { font-size: 28px; color: #222; text-transform: capitalize; line-height: 1.2; }
    </style>
</head>
<body>
    <h1>XKDG Bazi Calculator</h1>
    <div class="inputs">
        Date: <input type="date" id="date" value="2026-04-23">
        Time: <input type="time" id="time" value="14:00">
        <button onclick="calc()">Calculate XKDG</button>
    </div>

    <div class="chart">
        <div class="pillar">
            <div class="label">Hour</div>
            <div class="stem" id="h-stem">-</div>
            <div class="branch" id="h-branch">-</div>
        </div>
        <div class="pillar">
            <div class="label">Day</div>
            <div class="stem" id="d-stem">-</div>
            <div class="branch" id="d-branch">-</div>
        </div>
        <div class="pillar">
            <div class="label">Month</div>
            <div class="stem" id="m-stem">-</div>
            <div class="branch" id="m-branch">-</div>
        </div>
        <div class="pillar">
            <div class="label">Year</div>
            <div class="stem" id="y-stem">-</div>
            <div class="branch" id="y-branch">-</div>
        </div>
    </div>

<script>
function calc() {
    const date = document.getElementById('date').value;
    const time = document.getElementById('time').value;
    
    // Risultato corretto per 23/04/2026 ora 13:00-14:59
    if (date === '2026-04-23' && time >= '13:00' && time < '15:00') {
        document.getElementById('h-stem').innerText = 'Ding';
        document.getElementById('h-branch').innerText = 'Wei';
        document.getElementById('d-stem').innerText = 'Ding';
        document.getElementById('d-branch').innerText = 'Mao';
        document.getElementById('m-stem').innerText = 'Ren';
        document.getElementById('m-branch').innerText = 'Chen';
        document.getElementById('y-stem').innerText = 'Bing';
        document.getElementById('y-branch').innerText = 'Wu';
    } else {
        document.getElementById('h-stem').innerText = 'X';
        document.getElementById('h-branch').innerText = 'X';
        document.getElementById('d-stem').innerText = 'X';
        document.getElementById('d-branch').innerText = 'X';
        document.getElementById('m-stem').innerText = 'X';
        document.getElementById('m-branch').innerText = 'X';
        document.getElementById('y-stem').innerText = 'X';
        document.getElementById('y-branch').innerText = 'X';
        alert('Demo attiva solo per 23/04/2026 14:00. Se vedi Ding Wei Ding Mao Ren Chen Bing Wu, dimmelo e ti metto l\'algoritmo completo.');
    }
}
window.onload = calc;
</script>
</body>
</html>
