<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Four Pillars + XKDG</title>
  <style>
    body { font-family: Arial; text-align: center; margin: 20px; }
    table { margin: 20px auto; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 8px 16px; min-width: 80px; }
    th { background: #f5f5f5; }
    input { text-align: center; font-size: 14px; }
   .stem-cn { font-size: 20px; font-weight: bold; }
   .branch-cn { font-size: 20px; font-weight: bold; }
    /* COLORI 5 ELEMENTI */
   .wood { color: #2e8b57; }
   .fire { color: #d32f2f; }
   .earth { color: #8d6e63; }
   .metal { color: #757575; }
   .water { color: #1976d2; }
  </style>
</head>
<body>

  <h1>Four Pillars + XKDG</h1>

  <div style="display: flex; gap: 8px; justify-content: center; margin: 10px 0;">
    <button onclick="calculate()" style="padding: 4px 12px; font-size: 14px;">Calculate</button>
    <button onclick="setNow()" style="padding: 4px 12px; font-size: 14px;">NOW</button>
    <input id="longitude" type="number" step="0.01" placeholder="Long: 16.37"
           style="width: 110px; padding: 4px 12px; font-size: 14px; text-align: center;">
  </div>

  <table>
    <tr>
      <th>Time</th>
      <th>Hour 时</th>
      <th>Day 日</th>
      <th>Month 月</th>
      <th>Year 年</th>
    </tr>
    <tr>
      <td>Input</td>
      <td><input id="time" type="time" value="12:00"></td>
      <td><input id="day" type="number" min="1" max="31" value="1" style="width: 50px;"></td>
      <td><input id="month" type="number" min="1" max="12" value="1" style="width: 50px;"></td>
      <td><input id="year" type="number" min="1900" max="2100" value="2000" style="width: 70px;"></td>
    </tr>
    <tr>
      <td>Stem</td>
      <td><span id="h-stem-cn" class="stem-cn"></span><br><span id="h-stem-en"></span></td>
      <td><span id="d-stem-cn" class="stem-cn"></span><br><span id="d-stem-en"></span></td>
      <td><span id="m-stem-cn" class="stem-cn"></span><br><span id="m-stem-en"></span></td>
      <td><span id="y-stem-cn" class="stem-cn"></span><br><span id="y-stem-en"></span></td>
    </tr>
    <tr>
      <td>Branch</td>
      <td><span id="h-branch-cn" class="branch-cn"></span><br><span id="h-branch-en"></span></td>
      <td><span id="d-branch-cn" class="branch-cn"></span><br><span id="d-branch-en"></span></td>
      <td><span id="m-branch-cn" class="branch-cn"></span><br><span id="m-branch-en"></span></td>
      <td><span id="y-branch-cn" class="branch-cn"></span><br><span id="y-branch-en"></span></td>
    </tr>
    <tr>
      <td>Hex</td>
      <td id="h-hex"></td>
      <td id="d-hex"></td>
      <td id="m-hex"></td>
      <td id="y-hex"></td>
    </tr>
  </table>

<script>
// --- COSTANTI BAZI ---
const STEMS = [
  {en:'Jia', cn:'甲', el:'wood'}, {en:'Yi', cn:'乙', el:'wood'},
  {en:'Bing', cn:'丙', el:'fire'}, {en:'Ding', cn:'丁', el:'fire'},
  {en:'Wu', cn:'戊', el:'earth'}, {en:'Ji', cn:'己', el:'earth'},
  {en:'Geng', cn:'庚', el:'metal'}, {en:'Xin', cn:'辛', el:'metal'},
  {en:'Ren', cn:'壬', el:'water'}, {en:'Gui', cn:'癸', el:'water'}
];

const BRANCHES = [
  {en:'Zi', cn:'子', el:'water'}, {en:'Chou', cn:'丑', el:'earth'},
  {en:'Yin', cn:'寅', el:'wood'}, {en:'Mao', cn:'卯', el:'wood'},
  {en:'Chen', cn:'辰', el:'earth'}, {en:'Si', cn:'巳', el:'fire'},
  {en:'Wu', cn:'午', el:'fire'}, {en:'Wei', cn:'未', el:'earth'},
  {en:'Shen', cn:'申', el:'metal'}, {en:'You', cn:'酉', el:'metal'},
  {en:'Xu', cn:'戌', el:'earth'}, {en:'Hai', cn:'亥', el:'water'}
];

// --- FUNZIONE XKDG: RIMETTI LA TUA SE CE L'HAI ---
function getXKDGHexagram(stem, branch) {
  return ''; // Sostituisci con la tua funzione
}

// --- CALCOLO BAZI CORRETTO ---
function calculate() {
  const year = parseInt(document.getElementById('year').value);
  const month = parseInt(document.getElementById('month').value);
  const day = parseInt(document.getElementById('day').value);
  const timeStr = document.getElementById('time').value;
  const [hour, minute] = timeStr.split(':').map(Number);
  const lon = parseFloat(document.getElementById('longitude').value) || 120;

  // True Solar Time correction
  const offsetMinutes = Math.round((lon - 120) * 4);
  const date = new Date(year, month - 1, day, hour, minute + offsetMinutes);

  // --- YEAR PILLAR ---
  // Anno inizia a Li Chun ~4 Feb. Semplificato: se prima del 4 Feb usa anno-1
  let yearStem = (year - 4) % 10;
  if (month === 1 || (month === 2 && day < 4)) yearStem = (year - 5) % 10;
  if (yearStem < 0) yearStem += 10;
  const yearBranch = (year - 4) % 12;

  // --- DAY PILLAR ---
  // Algoritmo base giorno giuliano
  const jd = Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + day - 1524.5;
  const dayCycle = Math.floor(jd + 0.5) % 60;
  const dayStem = dayCycle % 10;
  const dayBranch = dayCycle % 12;

  // --- MONTH PILLAR ---
  // Semplificato: mese parte dal 5-8 del mese solare
  const monthStem = (yearStem * 2 + month) % 10;
  const monthBranch = (month + 1) % 12;

  // --- HOUR PILLAR ---
  const hourIndex = Math.floor((date.getHours() + 1) / 2) % 12;
  const hourStem = (dayStem * 2 + hourIndex) % 10;

  const pillars = [
    {p:'h', s:hourStem, b:hourIndex},
    {p:'d', s:dayStem, b:dayBranch},
    {p:'m', s:monthStem, b:monthBranch},
    {p:'y', s:yearStem, b:yearBranch}
  ];

  pillars.forEach(({p, s, b}) => {
    const stem = STEMS[s];
    const branch = BRANCHES[b];
    document.getElementById(p+'-stem-cn').textContent = stem.cn;
    document.getElementById(p+'-stem-en').textContent = stem.en;
    document.getElementById(p+'-stem-cn').className = 'stem-cn ' + stem.el;
    document.getElementById(p+'-branch-cn').textContent = branch.cn;
    document.getElementById(p+'-branch-en').textContent = branch.en;
    document.getElementById(p+'-branch-cn').className = 'branch-cn ' + branch.el;
    document.getElementById(p+'-hex').innerHTML = getXKDGHexagram(stem.en, branch.en);
  });
}

// --- TASTO NOW ---
function setNow() {
  const now = new Date();
  document.getElementById('time').value = now.toTimeString().slice(0,5);
  document.getElementById('day').value = now.getDate();
  document.getElementById('month').value = now.getMonth() + 1;
  document.getElementById('year').value = now.getFullYear();
  document.getElementById('longitude').value = document.getElementById('longitude').value || '16.37';
  calculate();
}

window.onload = calculate;
</script>

</body>
</html>
