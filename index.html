<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Four Pillars + XKDG</title>
  <style>
    body { font-family: Arial; text-align: center; margin: 20px; }
    table { margin: 20px auto; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 8px 16px; min-width: 80px; }
    th { background: #f5f5f5; }
    input { text-align: center; font-size: 14px; }
   .stem-cn { font-size: 20px; }
   .branch-cn { font-size: 20px; }
  </style>
</head>
<body>

  <h1>Four Pillars + XKDG</h1>

  <div style="display: flex; gap: 8px; justify-content: center; margin: 10px 0;">
    <button onclick="calculate()" style="padding: 4px 12px; font-size: 14px;">Calculate</button>
    <button onclick="setNow()" style="padding: 4px 12px; font-size: 14px;">NOW</button>
    <input id="longitude" type="number" step="0.01" placeholder="Long: 121.47"
           style="width: 110px; padding: 4px 12px; font-size: 14px; text-align: center;">
  </div>

  <table>
    <tr>
      <th>Time</th>
      <th>Hour 时</th>
      <th>Day 日</th>
      <th>Month 月</th>
      <th>Year 年</th>
    </tr>
    <tr>
      <td>Input</td>
      <td><input id="time" type="time" value="12:00"></td>
      <td><input id="day" type="number" min="1" max="31" value="1" style="width: 50px;"></td>
      <td><input id="month" type="number" min="1" max="12" value="1" style="width: 50px;"></td>
      <td><input id="year" type="number" min="1900" max="2100" value="2000" style="width: 70px;"></td>
    </tr>
    <tr>
      <td>Stem</td>
      <td><span id="h-stem-cn" class="stem-cn"></span><br><span id="h-stem-en"></span></td>
      <td><span id="d-stem-cn" class="stem-cn"></span><br><span id="d-stem-en"></span></td>
      <td><span id="m-stem-cn" class="stem-cn"></span><br><span id="m-stem-en"></span></td>
      <td><span id="y-stem-cn" class="stem-cn"></span><br><span id="y-stem-en"></span></td>
    </tr>
    <tr>
      <td>Branch</td>
      <td><span id="h-branch-cn" class="branch-cn"></span><br><span id="h-branch-en"></span></td>
      <td><span id="d-branch-cn" class="branch-cn"></span><br><span id="d-branch-en"></span></td>
      <td><span id="m-branch-cn" class="branch-cn"></span><br><span id="m-branch-en"></span></td>
      <td><span id="y-branch-cn" class="branch-cn"></span><br><span id="y-branch-en"></span></td>
    </tr>
    <tr>
      <td>Hex</td>
      <td id="h-hex"></td>
      <td id="d-hex"></td>
      <td id="m-hex"></td>
      <td id="y-hex"></td>
    </tr>
  </table>

<script>
// --- QUI METTI LE TUE COSTANTI STEMS, BRANCHES, ELEMENTS ---
const STEMS = ['Jia 甲','Yi 乙','Bing 丙','Ding 丁','Wu 戊','Ji 己','Geng 庚','Xin 辛','Ren 壬','Gui 癸'];
const BRANCHES = {
  'Zi':'Rat 子 Water','Chou':'Ox 丑 Earth','Yin':'Tiger 寅 Wood','Mao':'Rabbit 卯 Wood',
  'Chen':'Dragon 辰 Earth','Si':'Snake 巳 Fire','Wu':'Horse 午 Fire','Wei':'Goat 未 Earth',
  'Shen':'Monkey 申 Metal','You':'Rooster 酉 Metal','Xu':'Dog 戌 Earth','Hai':'Pig 亥 Water'
};
const ELEMENTS = {
  'Zi':'water','Chou':'earth','Yin':'wood','Mao':'wood','Chen':'earth','Si':'fire',
  'Wu':'fire','Wei':'earth','Shen':'metal','You':'metal','Xu':'earth','Hai':'water'
};

// --- FUNZIONE PLACEHOLDER PER XKDG: SOSTITUISCILA CON LA TUA ---
function getXKDGHexagram(gan, zhi) {
  return ''; // Metti qui la tua logica per calcolare l'esagramma
}

// --- CALCOLO PRINCIPALE: SOSTITUISCI CON LA TUA LOGICA ---
function calculate() {
  const year = parseInt(document.getElementById('year').value);
  const month = parseInt(document.getElementById('month').value);
  const day = parseInt(document.getElementById('day').value);
  const time = document.getElementById('time').value;
  const lon = parseFloat(document.getElementById('longitude').value) || 120;

  // TODO: Qui metti il tuo algoritmo Bazi completo
  // Questo è solo un esempio per far funzionare la tabella
  const pillars = [
    { prefix: 'h', stem: 'Jia', branch: 'Zi' },
    { prefix: 'd', stem: 'Yi', branch: 'Chou' },
    { prefix: 'm', stem: 'Bing', branch: 'Yin' },
    { prefix: 'y', stem: 'Ding', branch: 'Mao' }
  ];

  pillars.forEach(item => {
    document.getElementById(item.prefix+'-stem-cn').textContent = STEMS.find(s => s.includes(item.stem)).split(' ')[1];
    document.getElementById(item.prefix+'-stem-en').textContent = item.stem;
    document.getElementById(item.prefix+'-branch-cn').textContent = BRANCHES[item.branch].split(' ')[1];
    document.getElementById(item.prefix+'-branch-en').textContent = item.branch;
    document.getElementById(item.prefix+'-branch-cn').className = 'branch-cn ' + ELEMENTS[item.branch];
  });

  // Calcolo Hex se la funzione esiste
  if (typeof getXKDGHexagram === 'function') {
    document.getElementById('h-hex').innerHTML = getXKDGHexagram('Jia', 'Zi');
    document.getElementById('d-hex').innerHTML = getXKDGHexagram('Yi', 'Chou');
    document.getElementById('m-hex').innerHTML = getXKDGHexagram('Bing', 'Yin');
    document.getElementById('y-hex').innerHTML = getXKDGHexagram('Ding', 'Mao');
  }
}

// --- TASTO NOW: IMPOSTA DATA/ORA ATTUALE ---
function setNow() {
  const now = new Date();
  const lon = parseFloat(document.getElementById('longitude').value) || 16.37; // default Vienna

  // Conversione True Solar Time approssimata
  const offsetMinutes = Math.round((lon - 120) * 4);
  now.setMinutes(now.getMinutes() + offsetMinutes);

  document.getElementById('time').value = now.toTimeString().slice(0,5);
  document.getElementById('day').value = now.getDate();
  document.getElementById('month').value = now.getMonth() + 1;
  document.getElementById('year').value = now.getFullYear();
  calculate();
}

// Al caricamento pagina, calcola subito
window.onload = function() {
  calculate();
}
</script>

</body>
</html>
