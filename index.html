<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XKDG Bazi Calculator</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; }
td, th { border: 1px solid #ddd; padding: 8px; text-align: center; }
.stem-cn,.branch-cn { font-size: 24px; font-weight: bold; }
.wood { color: #2e8b57; }.fire { color: #dc143c; }.earth { color: #b8860b; }
.metal { color: #708090; }.water { color: #1e90ff; }
input { padding: 5px; margin: 5px; }
button { padding: 10px 20px; background: #4CAF50; color: white; border: none; cursor: pointer; }
</style>
</head>
<body>

<h1>XKDG Bazi Calculator</h1>
<div>
  <label>Date: <input type="date" id="date"></label>
  <label>Time: <input type="time" id="time"></label>
  <label>Longitude: <input type="number" id="longitude" value="12.4964" step="0.0001"></label>
  <button onclick="calculate()">Calculate</button>
</div>

<table>
  <tr>
    <th></th><th>Hour</th><th>Day</th><th>Month</th><th>Year</th>
  </tr>
  <tr>
    <td>Stem</td>
    <td><div id="h-stem-cn"></div><div id="h-stem-en"></div><div id="h-stem-el"></div></td>
    <td><div id="d-stem-cn"></div><div id="d-stem-en"></div><div id="d-stem-el"></div></td>
    <td><div id="m-stem-cn"></div><div id="m-stem-en"></div><div id="m-stem-el"></div></td>
    <td><div id="y-stem-cn"></div><div id="y-stem-en"></div><div id="y-stem-el"></div></td>
  </tr>
  <tr>
    <td>Branch</td>
    <td><div id="h-branch-cn"></div><div id="h-branch-en"></div><div id="h-branch-el"></div><div id="h-branch-an"></div></td>
    <td><div id="d-branch-cn"></div><div id="d-branch-en"></div><div id="d-branch-el"></div><div id="d-branch-an"></div></td>
    <td><div id="m-branch-cn"></div><div id="m-branch-en"></div><div id="m-branch-el"></div><div id="m-branch-an"></div></td>
    <td><div id="y-branch-cn"></div><div id="y-branch-en"></div><div id="y-branch-el"></div><div id="y-branch-an"></div></td>
  </tr>
</table>

<script src="lunar.min.js"></script>

<script>
function getSolarTime(hour, minute, longitude, timezoneOffset) {
    const lstm = 15 * timezoneOffset;
    const timeOffset = 4 * (longitude - lstm);
    const totalMinutes = hour * 60 + minute + timeOffset;
    const dayOffset = Math.floor(totalMinutes / 1440);
    const solarMinutes = ((totalMinutes % 1440) + 1440) % 1440;
    return {
        hour: Math.floor(solarMinutes / 60),
        minute: Math.floor(solarMinutes % 60),
        dayOffset: dayOffset
    };
}

function calculate() {
    const dateInput = document.getElementById('date').value;
    const timeInput = document.getElementById('time').value;
    const longitude = parseFloat(document.getElementById('longitude').value) || 12.4964;

    const [year, month, day] = dateInput.split('-').map(Number);
    const [hour, minute] = timeInput.split(':').map(Number);
    const timezoneOffset = -new Date(year, month - 1, day).getTimezoneOffset() / 60;

    const solarTime = getSolarTime(hour, minute, longitude, timezoneOffset);
    const baziDate = new Date(year, month - 1, day + solarTime.dayOffset, solarTime.hour, solarTime.minute);

    const solar = Solar.fromDate(baziDate);
    const lunar = solar.getLunar();

    const yearGZ = { stem: lunar.getYearGan(), branch: lunar.getYearZhi() };
    const monthGZ = { stem: lunar.getMonthGan(), branch: lunar.getMonthZhi() };
    const dayGZ = { stem: lunar.getDayGan(), branch: lunar.getDayZhi() };
    const hourGZ = { stem: lunar.getTimeGan(), branch: lunar.getTimeZhi() };

    const STEM_CN = {Jia:'甲', Yi:'乙', Bing:'丙', Ding:'丁', Wu:'戊', Ji:'己', Geng:'庚', Xin:'辛', Ren:'壬', Gui:'癸'};
    const BRANCH_CN = {Zi:'子', Chou:'丑', Yin:'寅', Mao:'卯', Chen:'辰', Si:'巳', Wu:'午', Wei:'未', Shen:'申', You:'酉', Xu:'戌', Hai:'亥'};
    const STEM_EL = {Jia:'+ Wood', Yi:'- Wood', Bing:'+ Fire', Ding:'- Fire', Wu:'+ Earth', Ji:'- Earth', Geng:'+ Metal', Xin:'- Metal', Ren:'+ Water', Gui:'- Water'};
    const BRANCH_EL = {Zi:'+ Water', Chou:'- Earth', Yin:'+ Wood', Mao:'- Wood', Chen:'+ Earth', Si:'- Fire', Wu:'+ Fire', Wei:'- Earth', Shen:'+ Metal', You:'- Metal', Xu:'+ Earth', Hai:'- Water'};
    const BRANCH_AN = {Zi:'Rat', Chou:'Ox', Yin:'Tiger', Mao:'Rabbit', Chen:'Dragon', Si:'Snake', Wu:'Horse', Wei:'Goat', Shen:'Monkey', You:'Rooster', Xu:'Dog', Hai:'Pig'};
    const EL_COLOR = {Jia:'wood', Yi:'wood', Bing:'fire', Ding:'fire', Wu:'earth', Ji:'earth', Geng:'metal', Xin:'metal', Ren:'water', Gui:'water'};
    const BR_COLOR = {Zi:'water', Chou:'earth', Yin:'wood', Mao:'wood', Chen:'earth', Si:'fire', Wu:'fire', Wei:'earth', Shen:'metal', You:'metal', Xu:'earth', Hai:'water'};

    const pillars = {h: hourGZ, d: dayGZ, m: monthGZ, y: yearGZ};
    ['h','d','m','y'].forEach((p) => {
        const gz = pillars[p];
        document.getElementById(`${p}-stem-cn`).textContent = STEM_CN[gz.stem];
        document.getElementById(`${p}-stem-cn`).className = `stem-cn ${EL_COLOR[gz.stem]}`;
        document.getElementById(`${p}-stem-en`).textContent = gz.stem;
        document.getElementById(`${p}-stem-el`).textContent = STEM_EL[gz.stem];
        document.getElementById(`${p}-branch-cn`).textContent = BRANCH_CN[gz.branch];
        document.getElementById(`${p}-branch-cn`).className = `branch-cn ${BR_COLOR[gz.branch]}`;
        document.getElementById(`${p}-branch-en`).textContent = gz.branch;
        document.getElementById(`${p}-branch-el`).textContent = BRANCH_EL[gz.branch];
        document.getElementById(`${p}-branch-an`).textContent = BRANCH_AN[gz.branch];
    });
}

window.onload = function() {
    const now = new Date();
    document.getElementById('date').value = now.toISOString().split('T')[0];
    document.getElementById('time').value = now.toTimeString().slice(0,5);
    calculate();
};
</script>
</body>
</html>
