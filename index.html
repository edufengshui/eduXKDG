<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XKDG Bazi Calculator Pro</title>
    <style>
        /* Artistic Calligraphic Font */
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');

        :root {
            --wood: #1a8a1a; --fire: #d40000; --earth: #8b5a2b;
            --metal: #555; --water: #0000cd;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 850px; }
        
        /* Optimized Command Bar */
        .inputs-row { display: flex; gap: 5px; margin-bottom: 25px; flex-wrap: nowrap; align-items: center; justify-content: space-between; }
        
        /* Reduced input widths to fit all buttons */
        #date { width: 120px; }
        #time { width: 80px; }
        #lon { width: 60px; }
        
        .inputs-row input { padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
        .inputs-row button { padding: 8px 10px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 11px; font-weight: bold; text-transform: uppercase; white-space: nowrap; }
        
        .btn-now { background: #6c757d; }
        .btn-gps { background: #007bff; }
        .btn-calc { background: #2d2d2d; }

        /* Chart Structure */
        .chart { display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid #ccc; border-radius: 4px; overflow: hidden; background: #fff; }
        .pillar { display: flex; flex-direction: column; border-right: 1px solid #eee; text-align: center; }
        .pillar:last-child { border-right: none; }
        
        .header { background: #f8f9fa; padding: 10px; font-weight: bold; font-size: 11px; color: #666; border-bottom: 1px solid #eee; letter-spacing: 1px; }
        .cell { padding: 15px 5px; border-bottom: 1px solid #fafafa; }
        
        /* Artistic Hanzi Style */
        .hanzi { 
            font-family: 'Ma Shan Zheng', cursive; 
            font-size: 54px; 
            line-height: 1.1;
            display: block;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.12));
        }
        .eng-name { font-size: 16px; font-weight: bold; margin-top: 4px; display: block; }
        .element-label { font-size: 10px; text-transform: uppercase; opacity: 0.6; font-weight: bold; }

        /* Hexagram & XKDG Section */
        .hex-section { padding: 15px 5px; border-top: 1px solid #f0f0f0; }
        .hex-wrapper { display: inline-flex; align-items: center; gap: 8px; }
        .hex-icon { font-size: 68px; color: #222; line-height: 1; }

        .data-column { 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            align-items: center;
            height: 68px; 
            font-weight: bold;
        }
        .num-xkdg { font-size: 17px; color: #000; }
        .side-pillar-small { font-size: 13px; line-height: 1.1; color: #333; font-family: 'Ma Shan Zheng', cursive; }

        .hex-info { margin-top: 8px; font-size: 11px; font-weight: bold; color: #444; line-height: 1.2; }

        /* Element Colors */
        .wood { color: var(--wood); } .fire { color: var(--fire); } .earth { color: var(--earth); }
        .metal { color: var(--metal); } .water { color: var(--water); }
    </style>
</head>
<body>

<div class="container">
    <div class="inputs-row">
        <input type="date" id="date">
        <input type="time" id="time">
        <input type="number" id="lon" placeholder="Lon" step="0.01">
        <button class="btn-now" onclick="setNow()">NOW</button>
        <button class="btn-gps" onclick="getLocation()">GPS</button>
        <button class="btn-calc" onclick="calculateBazi()">CALCULATE</button>
    </div>

    <div class="chart">
        <div class="pillar" id="p-hour"><div class="header">HOUR</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-day"><div class="header">DAY</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-month"><div class="header">MONTH</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
        <div class="pillar" id="p-year"><div class="header">YEAR</div><div class="cell stem"></div><div class="cell branch"></div><div class="hex-section"></div></div>
    </div>
</div>

<script>
const STEMS = [
    {en:'Jia', zh:'甲', el:'wood'}, {en:'Yi', zh:'乙', el:'wood'},
    {en:'Bing', zh:'丙', el:'fire'}, {en:'Ding', zh:'丁', el:'fire'},
    {en:'Wu', zh:'戊', el:'earth'}, {en:'Ji', zh:'己', el:'earth'},
    {en:'Geng', zh:'庚', el:'metal'}, {en:'Xin', zh:'辛', el:'metal'},
    {en:'Ren', zh:'壬', el:'water'}, {en:'Gui', zh:'癸', el:'water'}
];

const BRANCHES = [
    {en:'Zi', zh:'子', el:'water'}, {en:'Chou', zh:'丑', el:'earth'},
    {en:'Yin', zh:'寅', el:'wood'}, {en:'Mao', zh:'卯', el:'wood'},
    {en:'Chen', zh:'辰', el:'earth'}, {en:'Si', zh:'巳', el:'fire'},
    {en:'Wu', zh:'午', el:'fire'}, {en:'Wei', zh:'未', el:'earth'},
    {en:'Shen', zh:'申', el:'metal'}, {en:'You', zh:'酉', el:'metal'},
    {en:'Xu', zh:'戌', el:'earth'}, {en:'Hai', zh:'亥', el:'water'}
];

const REF_DATE = new Date(2026, 3, 27); 
const REF_STEM = 7; 
const REF_BRANCH = 7; 

function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
            document.getElementById('lon').value = pos.coords.longitude.toFixed(2);
            calculateBazi();
        }, () => alert("GPS not available."));
    }
}

function setNow() {
    const now = new Date();
    document.getElementById('date').value = now.toISOString().split('T')[0];
    document.getElementById('time').value = now.toTimeString().slice(0,5);
    calculateBazi();
}

function fillPillar(id, stemIdx, branchIdx) {
    const s = STEMS[stemIdx % 10];
    const b = BRANCHES[branchIdx % 12];
    const p = document.getElementById(id);
    p.querySelector('.stem').innerHTML = `<span class="hanzi ${s.el}">${s.zh}</span><span class="eng-name">${s.en}</span><span class="element-label">- ${s.el} -</span>`;
    p.querySelector('.branch').innerHTML = `<span class="hanzi ${b.el}">${b.zh}</span><span class="eng-name">${b.en}</span><span class="element-label">- ${b.el} -</span>`;
}

function setHex(id, icon, name, numT, numB, sideZh) {
    const section = document.querySelector(`#${id} .hex-section`);
    section.innerHTML = `
        <div class="hex-wrapper">
            <div class="hex-icon">${icon}</div>
            <div class="data-column">
                <div class="num-xkdg">${numT}</div>
                <div class="side-pillar-small">${sideZh}</div>
                <div class="num-xkdg">${numB}</div>
            </div>
        </div>
        <div class="hex-info">${name}</div>
    `;
}

function calculateBazi() {
    const dVal = document.getElementById('date').value;
    if(!dVal) return;
    const targetDate = new Date(dVal);
    
    const yearIdx = (targetDate.getFullYear() - 4) % 60;
    fillPillar('p-year', yearIdx % 10, yearIdx % 12);
    
    const diffDays = Math.floor((targetDate.getTime() - REF_DATE.getTime()) / (1000 * 60 * 60 * 24));
    let dS = (REF_STEM + diffDays) % 10; let dB = (REF_BRANCH + diffDays) % 12;
    fillPillar('p-day', dS < 0 ? dS + 10 : dS, dB < 0 ? dB + 12 : dB);
    
    fillPillar('p-month', 8, 4); 
    fillPillar('p-hour', 1, 7);  

    setHex('p-hour', '䷯', '48 Jing<br>Well', '7', '6', '乙<br>未');
    setHex('p-day', '䷅', '06 Song<br>Litigation', '9', '3', '辛<br>未');
    setHex('p-month', '䷙', '26 Da Chu<br>Big Livestock', '6', '4', '壬<br>辰');
    setHex('p-year', '䷛', '28 Da Guo<br>Great Exceeding', '4', '3', '丙<br>午');
}

window.onload = setNow;
</script>
</body>
</html>
